<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票分钟线K线图</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1280px; margin: 24px auto; padding: 0 16px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 28px rgba(2, 6, 23, 0.06);
      }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 180px 160px 120px 100px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 20px; }
      .chart-wrap {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 8px;
      }
      #chart {
        width: 100%;
        height: 620px;
      }
      @media (max-width: 900px) {
        .controls { grid-template-columns: 1fr 1fr; }
        #chart { height: 520px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>新浪分钟线 K 线图</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/prices.html">日线页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/llm_trend.html">LLM走势分析</a>
          </div>
        </div>

        <div class="controls">
          <input id="ts_code" value="600114.SH" placeholder="股票代码，如 600114.SH" />
          <input id="trade_date" placeholder="交易日 YYYYMMDD，不填则取最近一批" />
          <select id="page_size">
            <option value="500">500点</option>
            <option value="300">300点</option>
            <option value="240">240点</option>
          </select>
          <button id="search_btn">绘制</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>

        <div class="chart-wrap">
          <div id="chart"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        ts_code: '600114.SH',
        trade_date: '',
        page_size: 500,
      };

      const els = {
        ts_code: document.getElementById('ts_code'),
        trade_date: document.getElementById('trade_date'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        chart: document.getElementById('chart'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function pad(n) { return String(n).padStart(2, '0'); }
      function normalizeTs(t) {
        if (typeof t === 'number') return t;
        if (t && typeof t === 'object' && typeof t.timestamp === 'number') return t.timestamp;
        return 0;
      }
      function fmtTs(ts) {
        const d = new Date(ts * 1000);
        const y = d.getUTCFullYear();
        const m = pad(d.getUTCMonth() + 1);
        const day = pad(d.getUTCDate());
        const hh = pad(d.getUTCHours());
        const mm = pad(d.getUTCMinutes());
        return `${y}-${m}-${day} ${hh}:${mm}`;
      }

      const chart = LightweightCharts.createChart(els.chart, {
        layout: {
          background: { color: '#ffffff' },
          textColor: '#111827',
        },
        localization: {
          timeFormatter: (time) => fmtTs(normalizeTs(time)),
        },
        grid: {
          vertLines: { color: '#eef2f7' },
          horzLines: { color: '#eef2f7' },
        },
        rightPriceScale: { borderColor: '#d1d5db' },
        timeScale: {
          borderColor: '#d1d5db',
          timeVisible: true,
          secondsVisible: false,
          tickMarkFormatter: (time) => {
            const ts = normalizeTs(time);
            const d = new Date(ts * 1000);
            return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
          },
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      });

      const candleSeries = chart.addCandlestickSeries({
        upColor: '#16a34a',
        downColor: '#dc2626',
        wickUpColor: '#16a34a',
        wickDownColor: '#dc2626',
        borderVisible: false,
        priceLineVisible: true,
      });

      const volumeSeries = chart.addHistogramSeries({
        color: '#93c5fd',
        priceFormat: { type: 'volume' },
        priceScaleId: '',
      });
      volumeSeries.priceScale().applyOptions({
        scaleMargins: { top: 0.78, bottom: 0 },
      });

      function toUnixTs(tradeDate, minuteTime) {
        const y = tradeDate.slice(0, 4);
        const m = tradeDate.slice(4, 6);
        const d = tradeDate.slice(6, 8);
        const [hh, mm, ss] = minuteTime.split(':').map((x) => Number(x));
        // 以“交易时钟时间”作为UTC刻度，避免浏览器时区导致的时间偏移
        return Math.floor(Date.UTC(Number(y), Number(m) - 1, Number(d), hh, mm, ss || 0) / 1000);
      }

      function buildCandles(items) {
        const sorted = [...items].sort((a, b) => {
          if (a.trade_date !== b.trade_date) return a.trade_date.localeCompare(b.trade_date);
          return a.minute_time.localeCompare(b.minute_time);
        });

        const candles = [];
        const volumes = [];
        let prevClose = null;

        for (const it of sorted) {
          const close = Number(it.price || 0);
          const open = prevClose === null ? close : prevClose;
          const high = Math.max(open, close);
          const low = Math.min(open, close);
          const time = toUnixTs(it.trade_date, it.minute_time);

          candles.push({ time, open, high, low, close });
          volumes.push({
            time,
            value: Number(it.volume || 0),
            color: close >= open ? 'rgba(22, 163, 74, 0.5)' : 'rgba(220, 38, 38, 0.5)',
          });
          prevClose = close;
        }

        return { candles, volumes, sorted };
      }

      async function fetchData() {
        const q = new URLSearchParams({
          ts_code: state.ts_code,
          trade_date: state.trade_date,
          page: '1',
          page_size: String(state.page_size),
        });

        els.meta.textContent = '加载中...';

        try {
          const res = await fetch(`${API_BASE}/api/minline?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');

          const items = data.items || [];
          if (!items.length) {
            candleSeries.setData([]);
            volumeSeries.setData([]);
            els.meta.textContent = '未查询到数据';
            return;
          }

          const { candles, volumes, sorted } = buildCandles(items);
          candleSeries.setData(candles);
          volumeSeries.setData(volumes);
          chart.timeScale().fitContent();
          chart.timeScale().scrollToRealTime();

          const latest = sorted[sorted.length - 1];
          els.meta.textContent = `已绘制 ${items.length} 条分钟数据，${latest.ts_code} ${latest.trade_date}，API: ${API_BASE}`;
        } catch (err) {
          candleSeries.setData([]);
          volumeSeries.setData([]);
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      function search() {
        state.ts_code = els.ts_code.value.trim().toUpperCase();
        state.trade_date = els.trade_date.value.trim();
        state.page_size = Number(els.page_size.value);
        fetchData();
      }

      function scheduleRefresh(delay = 500) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            const evt = msg.event || '';
            if (!['minline_update', 'minline_batch_update', 'minline_round_update', 'minline_full_update'].includes(evt)) return;
            const payload = (msg.payload || {}).payload || {};
            const tsCode = String(payload.ts_code || '').toUpperCase();
            if (evt === 'minline_update' && tsCode && state.ts_code && tsCode !== state.ts_code) return;
            scheduleRefresh(300);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', search);
      [els.ts_code, els.trade_date].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search();
        });
      });
      els.page_size.addEventListener('change', search);

      const ro = new ResizeObserver(() => {
        chart.applyOptions({ width: els.chart.clientWidth, height: els.chart.clientHeight });
      });
      ro.observe(els.chart);

      fetchData();
      setInterval(fetchData, 20000);
      connectRealtime();
    </script>
  </body>
</html>
