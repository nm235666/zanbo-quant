<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票日线价格查询</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1300px; margin: 24px auto; padding: 0 16px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 10px 28px rgba(2, 6, 23, 0.06);
        padding: 16px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 { margin: 0; font-size: 24px; }
      .link {
        color: var(--primary);
        text-decoration: none;
        font-size: 14px;
      }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 180px 160px 160px 120px 100px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button {
        background: var(--primary);
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; }
      .table-wrap {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: auto;
      }
      table { width: 100%; min-width: 1200px; border-collapse: collapse; }
      th, td {
        padding: 10px;
        border-bottom: 1px solid #eef2f7;
        text-align: left;
        white-space: nowrap;
        font-size: 14px;
      }
      th {
        background: #f8fafc;
        position: sticky;
        top: 0;
      }
      .pager {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pager button { width: 90px; }
      @media (max-width: 960px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>股票日线价格查询</h1>
          <a class="link" href="/index.html">返回股票代码页</a>
        <span style="margin:0 6px;color:#94a3b8;">|</span>
          <a class="link" href="/minline.html">分钟线页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/llm_trend.html">LLM走势分析</a>
        </div>

        <div class="controls">
          <input id="ts_code" placeholder="股票代码，如 000001.SZ" />
          <input id="start_date" placeholder="开始日期 YYYYMMDD" />
          <input id="end_date" placeholder="结束日期 YYYYMMDD" />
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>交易日期</th>
                <th>股票代码</th>
                <th>股票简称</th>
                <th>开盘价</th>
                <th>最高价</th>
                <th>最低价</th>
                <th>收盘价</th>
                <th>昨收价</th>
                <th>涨跌额</th>
                <th>涨跌幅(%)</th>
                <th>成交量</th>
                <th>成交额</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        ts_code: '',
        start_date: '',
        end_date: '',
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
      };

      const els = {
        ts_code: document.getElementById('ts_code'),
        start_date: document.getElementById('start_date'),
        end_date: document.getElementById('end_date'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        meta: document.getElementById('meta'),
        page_info: document.getElementById('page_info'),
        tbody: document.getElementById('tbody'),
      };

      function fmtNum(v) {
        if (v === null || v === undefined || v === '') return '';
        const n = Number(v);
        if (Number.isNaN(n)) return v;
        return n.toFixed(2);
      }

      function renderRows(items) {
        els.tbody.innerHTML = items.map((it) => `
          <tr>
            <td>${it.trade_date || ''}</td>
            <td>${it.ts_code || ''}</td>
            <td>${it.name || ''}</td>
            <td>${fmtNum(it.open)}</td>
            <td>${fmtNum(it.high)}</td>
            <td>${fmtNum(it.low)}</td>
            <td>${fmtNum(it.close)}</td>
            <td>${fmtNum(it.pre_close)}</td>
            <td>${fmtNum(it.change)}</td>
            <td>${fmtNum(it.pct_chg)}</td>
            <td>${fmtNum(it.vol)}</td>
            <td>${fmtNum(it.amount)}</td>
          </tr>
        `).join('');
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          ts_code: state.ts_code,
          start_date: state.start_date,
          end_date: state.end_date,
          page: String(state.page),
          page_size: String(state.page_size),
        });

        els.meta.textContent = '查询中...';

        try {
          const res = await fetch(`${API_BASE}/api/prices?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');

          state.total_pages = data.total_pages || 1;
          state.total = data.total || 0;

          renderRows(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          els.meta.textContent = `请求失败: ${err.message}`;
          els.tbody.innerHTML = '';
          state.total_pages = 1;
          updatePager();
        }
      }

      function search(resetPage = true) {
        state.ts_code = els.ts_code.value.trim().toUpperCase();
        state.start_date = els.start_date.value.trim();
        state.end_date = els.end_date.value.trim();
        state.page_size = Number(els.page_size.value);
        if (resetPage) state.page = 1;
        fetchData();
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.ts_code, els.start_date, els.end_date].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      els.page_size.addEventListener('change', () => search(true));

      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });

      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
    </script>
  </body>
</html>
