<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>群聊投资倾向总览</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 34%),
          radial-gradient(circle at 100% 100%, #dbeafe 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1360px; margin: 24px auto 40px; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); padding: 18px; }
      .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
      h1 { margin:0; font-size:28px; }
      .sub { margin-top:6px; color:var(--muted); font-size:14px; line-height:1.75; }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      .nav a { color:var(--primary); text-decoration:none; font-size:14px; }
      .summary-grid { margin-top:16px; display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; }
      .summary-card { border:1px solid var(--border); border-radius:14px; padding:14px; background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%); }
      .summary-label { color:var(--muted); font-size:12px; }
      .summary-value { margin-top:6px; font-size:26px; font-weight:700; }
      .controls { margin-top:18px; display:grid; grid-template-columns:1.3fr 140px 1fr 120px 110px; gap:10px; }
      input, select, button { height:42px; border-radius:12px; border:1px solid var(--border); padding:0 12px; font-size:14px; background:#fff; }
      button { cursor:pointer; border:none; color:#fff; background:var(--primary); }
      button:hover { background:var(--primary-dark); }
      .meta { margin:12px 0; color:var(--muted); font-size:13px; min-height:18px; }
      .list { display:grid; gap:12px; }
      .card { border:1px solid var(--border); border-radius:16px; padding:16px; background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%); }
      .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
      .title { font-size:19px; font-weight:700; line-height:1.45; }
      .title-sub { margin-top:4px; color:var(--muted); font-size:12px; line-height:1.7; }
      .badges { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
      .badge { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; border:1px solid #d6dde7; background:#f8fafc; color:#334155; }
      .badge-bull { background:#14532d; color:#fff; border-color:#14532d; }
      .badge-bear { background:#7f1d1d; color:#fff; border-color:#7f1d1d; }
      .badge-active { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
      .summary { margin-top:12px; padding:12px 14px; border-radius:14px; background:#f8fafc; border:1px solid #dbe4ea; color:#1f2937; line-height:1.8; }
      .grid { margin-top:12px; display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
      .kv { border:1px solid var(--border); border-radius:12px; padding:10px 12px; background:#fff; }
      .kv .k { color:var(--muted); font-size:12px; }
      .kv .v { margin-top:6px; font-size:14px; font-weight:700; line-height:1.6; word-break:break-word; }
      .targets { margin-top:12px; display:grid; gap:10px; }
      .target { border:1px solid var(--border); border-radius:12px; padding:12px; background:#fff; }
      .target-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
      .target-title { font-size:15px; font-weight:700; }
      .target-reason { margin-top:8px; color:#334155; line-height:1.75; font-size:14px; }
      .pager { margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
      .pager button { width:90px; }
      .empty { border:1px dashed var(--border); border-radius:14px; padding:26px; text-align:center; color:var(--muted); }
      @media (max-width: 1100px) {
        .summary-grid, .grid { grid-template-columns:1fr 1fr; }
        .controls { grid-template-columns:1fr 1fr; }
      }
      @media (max-width: 640px) {
        .summary-grid, .grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div>
            <h1>群聊投资倾向总览</h1>
            <div class="sub">查看每个群最近一次的投资倾向分析结果，包括群整体结论、重点投资标的，以及每个标的的看多/看空理由。</div>
          </div>
          <div class="nav">
            <a href="/index.html">首页</a>
            <a href="/chatrooms.html">群聊总览</a>
            <a href="/wechat_chatlog.html">聊天记录查询</a>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-card"><div class="summary-label">已分析群聊</div><div class="summary-value" id="sum_total">-</div></div>
          <div class="summary-card"><div class="summary-label">整体看多</div><div class="summary-value" id="sum_bull">-</div></div>
          <div class="summary-card"><div class="summary-label">整体看空</div><div class="summary-value" id="sum_bear">-</div></div>
          <div class="summary-card"><div class="summary-label">有标的清单</div><div class="summary-value" id="sum_targets">-</div></div>
        </div>

        <div class="controls">
          <input id="keyword" placeholder="搜索群名/群总结" />
          <select id="final_bias">
            <option value="">全部倾向</option>
          </select>
          <input id="target_keyword" placeholder="按投资标的关键词筛选，如 原油 / 英伟达" />
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="list" id="list"></div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = { keyword: '', final_bias: '', target_keyword: '', page: 1, page_size: 20, total_pages: 1, total: 0 };
      const els = {
        keyword: document.getElementById('keyword'),
        final_bias: document.getElementById('final_bias'),
        target_keyword: document.getElementById('target_keyword'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
        sum_total: document.getElementById('sum_total'),
        sum_bull: document.getElementById('sum_bull'),
        sum_bear: document.getElementById('sum_bear'),
        sum_targets: document.getElementById('sum_targets'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function parseTargets(raw) {
        if (!raw) return [];
        try {
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (_) {
          return [];
        }
      }

      function fillSelect(selectEl, items, placeholder, currentValue) {
        selectEl.innerHTML = [`<option value="">${placeholder}</option>`]
          .concat((items || []).map((item) => {
            const selected = item === currentValue ? ' selected' : '';
            return `<option value="${escapeHtml(item)}"${selected}>${escapeHtml(item)}</option>`;
          }))
          .join('');
      }

      function updateSummary(summary) {
        els.sum_total.textContent = summary.analysis_total ?? '-';
        els.sum_bull.textContent = summary.bullish_total ?? '-';
        els.sum_bear.textContent = summary.bearish_total ?? '-';
        els.sum_targets.textContent = summary.with_targets_total ?? '-';
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="empty">暂无符合条件的分析结果</div>';
          return;
        }
        els.list.innerHTML = items.map((it) => {
          const targets = parseTargets(it.targets_json);
          const displayName = it.remark || it.nick_name || it.talker || it.room_id || '(未命名群)';
          return `
            <article class="card">
              <div class="card-head">
                <div>
                  <div class="title">${escapeHtml(displayName)}</div>
                  <div class="title-sub">
                    room_id: ${escapeHtml(it.room_id || '')}
                    ${it.latest_message_date ? ` | 最新消息: ${escapeHtml(it.latest_message_date)}` : ''}
                    ${it.analysis_date ? ` | 分析日期: ${escapeHtml(it.analysis_date)}` : ''}
                  </div>
                </div>
                <div class="badges">
                  <span class="${it.final_bias === '看多' ? 'badge badge-bull' : 'badge badge-bear'}">整体${escapeHtml(it.final_bias || '-')}</span>
                  <span class="badge badge-active">${escapeHtml(it.model || '-')}</span>
                </div>
              </div>

              <div class="summary">${escapeHtml(it.room_summary || '')}</div>

              <div class="grid">
                <div class="kv"><div class="k">分析窗口</div><div class="v">${it.analysis_window_days ?? '-'} 天</div></div>
                <div class="kv"><div class="k">消息数</div><div class="v">${it.message_count ?? 0}</div></div>
                <div class="kv"><div class="k">发言人数</div><div class="v">${it.sender_count ?? 0}</div></div>
                <div class="kv"><div class="k">成员数 / 监控状态</div><div class="v">${it.user_count ?? '-'} / ${it.skip_realtime_monitor ? '已停监控' : '监控中'}</div></div>
              </div>

              <div class="targets">
                ${targets.length ? targets.map((target) => `
                  <div class="target">
                    <div class="target-head">
                      <div class="target-title">${escapeHtml(target.name || '')}</div>
                      <span class="${target.bias === '看多' ? 'badge badge-bull' : 'badge badge-bear'}">${escapeHtml(target.bias || '')}</span>
                    </div>
                    <div class="target-reason">${escapeHtml(target.reason || '')}</div>
                  </div>
                `).join('') : '<div class="target"><div class="target-reason">暂无标的分析结果</div></div>'}
              </div>
            </article>
          `;
        }).join('');
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          keyword: state.keyword,
          final_bias: state.final_bias,
          target_keyword: state.target_keyword,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/chatrooms/investment?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total = data.total || 0;
          state.total_pages = data.total_pages || 1;
          updateSummary(data.summary || {});
          fillSelect(els.final_bias, data.filters?.final_biases || [], '全部倾向', state.final_bias);
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 个分析结果，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          renderList([]);
          updatePager();
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      function search(resetPage = true) {
        state.keyword = els.keyword.value.trim();
        state.final_bias = els.final_bias.value.trim();
        state.target_keyword = els.target_keyword.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      function scheduleRefresh(delay = 700) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            const evt = msg.event || '';
            if (!['chatlog_monitor_update', 'chatroom_fetch_update'].includes(evt)) return;
            scheduleRefresh(400);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.keyword, els.target_keyword].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      [els.final_bias, els.page_size].forEach((el) => el.addEventListener('change', () => search(true)));
      els.prev_btn.addEventListener('click', () => { if (state.page > 1) { state.page -= 1; fetchData(); } });
      els.next_btn.addEventListener('click', () => { if (state.page < state.total_pages) { state.page += 1; fetchData(); } });
      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
