<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信群聊天记录</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
        --quote-bg: #f8fafc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1180px; margin: 24px auto; padding: 0 16px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(2, 6, 23, 0.05);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 220px 180px 1fr 130px 150px 150px 110px 100px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button {
        background: var(--primary);
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button:hover { background: var(--primary-dark); }
      .meta {
        margin: 10px 0;
        color: var(--muted);
        font-size: 13px;
        min-height: 18px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: #fff;
      }
      .item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .sender {
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
      }
      .head-meta {
        font-size: 12px;
        color: #64748b;
      }
      .badges {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .badge {
        border-radius: 999px;
        font-size: 12px;
        line-height: 1;
        padding: 7px 10px;
        border: 1px solid #d1d5db;
        background: #f8fafc;
        color: #334155;
      }
      .badge-quote {
        background: #ecfeff;
        color: #155e75;
        border-color: #a5f3fc;
      }
      .badge-system {
        background: #eff6ff;
        color: #1d4ed8;
        border-color: #bfdbfe;
      }
      .badge-text {
        background: #ecfdf5;
        color: #166534;
        border-color: #bbf7d0;
      }
      .content {
        margin: 0;
        line-height: 1.8;
        color: #1f2937;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .quote {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid #dbe4ea;
        background: var(--quote-bg);
      }
      .quote-title {
        margin: 0 0 6px;
        font-size: 12px;
        color: #64748b;
      }
      .quote-content {
        margin: 0;
        line-height: 1.7;
        color: #334155;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        color: #64748b;
        background: #fff;
      }
      .pager {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pager button { width: 90px; }
      @media (max-width: 1080px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>微信群聊天记录</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/source_monitor.html">数据源监控</a>
          </div>
        </div>

        <div class="controls">
          <select id="talker">
            <option value="">全部群聊</option>
          </select>
          <select id="sender_name">
            <option value="">全部发送人</option>
          </select>
          <input id="keyword" placeholder="关键词（消息内容/引用内容/发送人）" />
          <select id="is_quote">
            <option value="">全部消息</option>
            <option value="1">仅引用</option>
            <option value="0">仅非引用</option>
          </select>
          <input id="query_date_start" type="date" />
          <input id="query_date_end" type="date" />
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="list" id="list"></div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        talker: '',
        sender_name: '',
        keyword: '',
        is_quote: '',
        query_date_start: '',
        query_date_end: '',
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
      };

      const els = {
        talker: document.getElementById('talker'),
        sender_name: document.getElementById('sender_name'),
        keyword: document.getElementById('keyword'),
        is_quote: document.getElementById('is_quote'),
        query_date_start: document.getElementById('query_date_start'),
        query_date_end: document.getElementById('query_date_end'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
      };

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function fillSelectOptions(selectEl, values, currentValue, placeholder) {
        const options = [`<option value="">${placeholder}</option>`]
          .concat((values || []).map((value) => {
            const selected = value === currentValue ? ' selected' : '';
            return `<option value="${escapeHtml(value)}"${selected}>${escapeHtml(value)}</option>`;
          }));
        selectEl.innerHTML = options.join('');
      }

      function badgeClass(type, isQuote) {
        if (isQuote) return 'badge badge-quote';
        if (type === 'system') return 'badge badge-system';
        return 'badge badge-text';
      }

      function typeLabel(type, isQuote) {
        if (isQuote) return '引用消息';
        if (type === 'system') return '系统消息';
        if (type === 'quote') return '引用消息';
        return '普通消息';
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="empty">暂无符合条件的聊天记录</div>';
          return;
        }
        els.list.innerHTML = items.map((it) => `
          <article class="item">
            <div class="item-head">
              <div>
                <div class="sender">${escapeHtml(it.sender_name || '(未知发送人)')}</div>
                <div class="head-meta">
                  群聊: ${escapeHtml(it.talker || '')}
                  ${it.message_date ? ` | 日期: ${escapeHtml(it.message_date)}` : ''}
                  ${it.message_time ? ` | 时间: ${escapeHtml(it.message_time)}` : ''}
                </div>
              </div>
              <div class="badges">
                <span class="${badgeClass(it.message_type, Number(it.is_quote) === 1)}">${typeLabel(it.message_type, Number(it.is_quote) === 1)}</span>
                ${it.query_date_start ? `<span class="badge">采集区间: ${escapeHtml(it.query_date_start)}${it.query_date_end && it.query_date_end !== it.query_date_start ? ` ~ ${escapeHtml(it.query_date_end)}` : ''}</span>` : ''}
              </div>
            </div>
            <p class="content">${escapeHtml(it.content_clean || it.content || '')}</p>
            ${Number(it.is_quote) === 1 ? `
              <div class="quote">
                <p class="quote-title">
                  引用自: ${escapeHtml(it.quote_sender_name || '')}
                  ${it.quote_time_text ? ` | ${escapeHtml(it.quote_time_text)}` : ''}
                </p>
                <p class="quote-content">${escapeHtml(it.quote_content || '')}</p>
              </div>
            ` : ''}
          </article>
        `).join('');
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          talker: state.talker,
          sender_name: state.sender_name,
          keyword: state.keyword,
          is_quote: state.is_quote,
          query_date_start: state.query_date_start,
          query_date_end: state.query_date_end,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/wechat-chatlog?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total = data.total || 0;
          state.total_pages = data.total_pages || 1;
          fillSelectOptions(els.talker, data.filters?.talkers || [], state.talker, '全部群聊');
          fillSelectOptions(els.sender_name, data.filters?.senders || [], state.sender_name, '全部发送人');
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          state.total = 0;
          state.total_pages = 1;
          renderList([]);
          updatePager();
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      function search(resetPage = true) {
        state.talker = els.talker.value.trim();
        state.sender_name = els.sender_name.value.trim();
        state.keyword = els.keyword.value.trim();
        state.is_quote = els.is_quote.value.trim();
        state.query_date_start = els.query_date_start.value.trim();
        state.query_date_end = els.query_date_end.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.keyword, els.query_date_start, els.query_date_end].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      [els.talker, els.sender_name, els.is_quote, els.page_size].forEach((el) => {
        el.addEventListener('change', () => search(true));
      });
      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
    </script>
  </body>
</html>
