<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新闻日报总结</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1260px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 160px 220px 160px 120px 100px 160px 140px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
      .grid { display: grid; grid-template-columns: 360px 1fr; gap: 10px; }
      .list {
        border: 1px solid var(--border);
        border-radius: 12px;
        max-height: 720px;
        overflow: auto;
        background: #fff;
      }
      .item {
        border-bottom: 1px solid #eef2f7;
        padding: 10px 12px;
        cursor: pointer;
      }
      .item:hover { background: #f8fafc; }
      .item.active { background: #ecfeff; }
      .title { margin: 0 0 4px; font-size: 14px; font-weight: 700; line-height: 1.45; }
      .sub { margin: 0; font-size: 12px; color: #64748b; line-height: 1.5; }
      .detail {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 720px;
        background: #fff;
      }
      .detail-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eef2f7;
        flex-wrap: wrap;
      }
      .detail-title {
        font-size: 14px;
        font-weight: 700;
        color: #0f172a;
      }
      .detail-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .ghost-btn {
        height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .ghost-btn:hover {
        background: #eef2f7;
      }
      .ghost-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .markdown-body { line-height: 1.9; color: #1f2937; font-size: 15px; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        margin: 10px 0 8px;
        line-height: 1.45;
      }
      .markdown-body ul, .markdown-body ol { padding-left: 22px; }
      .markdown-body blockquote {
        margin: 10px 0;
        padding: 6px 12px;
        border-left: 4px solid #94a3b8;
        color: #334155;
        background: #f8fafc;
      }
      .pager {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pager button { width: 90px; }
      @media (max-width: 980px) {
        .controls { grid-template-columns: 1fr 1fr; }
        .grid { grid-template-columns: 1fr; }
        .detail, .list { min-height: auto; max-height: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>新闻日报总结</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/news.html">国际财经资讯</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/cn_news.html">国内财经资讯</a>
          </div>
        </div>

        <div class="controls">
          <input id="summary_date" placeholder="日期 YYYY-MM-DD（可选）" />
          <input id="source_filter" placeholder="来源过滤关键字（可选）" />
          <select id="model">
            <option value="">全部模型</option>
            <option value="GPT-5.4">GPT-5.4</option>
            <option value="kimi-k2.5">kimi-k2.5</option>
            <option value="deepseek-chat">deepseek-chat</option>
          </select>
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
          <select id="gen_model">
            <option value="GPT-5.4">生成模型: GPT-5.4</option>
            <option value="kimi-k2.5">生成模型: kimi-k2.5</option>
            <option value="deepseek-chat">生成模型: deepseek-chat</option>
          </select>
          <button id="gen_btn">生成今日总结</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>

        <div class="grid">
          <div>
            <div class="list" id="list"></div>
            <div class="pager">
              <button id="prev_btn">上一页</button>
              <div id="page_info">第 1 / 1 页</div>
              <button id="next_btn">下一页</button>
            </div>
          </div>
          <div class="detail">
            <div class="detail-toolbar">
              <div class="detail-title" id="detail_title">日报总结详情</div>
              <div class="detail-actions">
                <button id="download_md_btn" class="ghost-btn" disabled>下载 Markdown</button>
                <button id="download_image_btn" class="ghost-btn" disabled>下载为图片</button>
              </div>
            </div>
            <div class="markdown-body" id="detail">请选择左侧一条日报总结查看内容。</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        summary_date: '',
        source_filter: '',
        model: '',
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
        items: [],
        active_id: null,
        current_job_id: '',
        current_job_model: '',
        current_job_timer: null,
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;

      const els = {
        summary_date: document.getElementById('summary_date'),
        source_filter: document.getElementById('source_filter'),
        model: document.getElementById('model'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        gen_model: document.getElementById('gen_model'),
        gen_btn: document.getElementById('gen_btn'),
        detail_title: document.getElementById('detail_title'),
        download_md_btn: document.getElementById('download_md_btn'),
        download_image_btn: document.getElementById('download_image_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        detail: document.getElementById('detail'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
      };

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderList() {
        const items = state.items || [];
        if (!items.length) {
          els.list.innerHTML = '<div class="item"><p class="sub">暂无数据</p></div>';
          els.detail.textContent = '暂无日报总结。';
          return;
        }
        els.list.innerHTML = items.map((it) => `
          <div class="item ${state.active_id === it.id ? 'active' : ''}" data-id="${it.id}">
            <p class="title">${escapeHtml(it.summary_date)} | ${escapeHtml(it.model)}</p>
            <p class="sub">新闻数: ${it.news_count} | 重要度: ${escapeHtml(it.filter_importance || '')}</p>
            <p class="sub">来源筛选: ${escapeHtml(it.source_filter || '(无)')}</p>
            <p class="sub">创建时间: ${escapeHtml(it.created_at || '')}</p>
          </div>
        `).join('');

        els.list.querySelectorAll('.item[data-id]').forEach((node) => {
          node.addEventListener('click', () => {
            const id = Number(node.getAttribute('data-id'));
            state.active_id = id;
            renderList();
            const cur = state.items.find((x) => x.id === id);
            renderDetail(cur);
          });
        });
      }

      function renderDetail(item) {
        if (!item) {
          els.detail_title.textContent = '日报总结详情';
          els.download_md_btn.disabled = true;
          els.download_image_btn.disabled = true;
          els.detail.textContent = '请选择左侧一条日报总结查看内容。';
          return;
        }
        els.detail_title.textContent = `${item.summary_date || ''} | ${item.model || ''}`;
        els.download_md_btn.disabled = false;
        els.download_image_btn.disabled = false;
        marked.setOptions({ gfm: true, breaks: true });
        const md = item.summary_markdown || '';
        els.detail.innerHTML = marked.parse(md);
      }

      function buildImageFileName(item) {
        const dateText = (item?.summary_date || 'unknown-date').replaceAll('-', '');
        const modelText = (item?.model || 'unknown-model').replaceAll(/[\\/:*?"<>|\\s]+/g, '_');
        return `${dateText}_新闻日报总结_${modelText}.png`;
      }

      function buildMarkdownFileName(item) {
        const dateText = (item?.summary_date || 'unknown-date').replaceAll('-', '');
        const modelText = (item?.model || 'unknown-model').replaceAll(/[\\/:*?"<>|\\s]+/g, '_');
        return `${dateText}_新闻日报总结_${modelText}.md`;
      }

      function downloadCurrentDetailAsMarkdown() {
        const item = (state.items || []).find((x) => x.id === state.active_id);
        if (!item) {
          els.meta.textContent = '当前没有可下载的日报总结';
          return;
        }
        const content = String(item.summary_markdown || '').trim();
        if (!content) {
          els.meta.textContent = '当前日报总结没有 Markdown 内容';
          return;
        }
        const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = buildMarkdownFileName(item);
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
        els.meta.textContent = `Markdown 已下载：${buildMarkdownFileName(item)}`;
      }

      async function downloadCurrentDetailAsImage() {
        const item = (state.items || []).find((x) => x.id === state.active_id);
        if (!item) {
          els.meta.textContent = '当前没有可下载的日报总结';
          return;
        }
        if (typeof html2canvas !== 'function') {
          els.meta.textContent = '图片导出组件未加载成功';
          return;
        }
        els.download_image_btn.disabled = true;
        const oldText = els.meta.textContent;
        els.meta.textContent = '正在生成图片...';
        try {
          const canvas = await html2canvas(els.detail, {
            backgroundColor: '#ffffff',
            scale: 2,
            useCORS: true,
          });
          const link = document.createElement('a');
          link.href = canvas.toDataURL('image/png');
          link.download = buildImageFileName(item);
          document.body.appendChild(link);
          link.click();
          link.remove();
          els.meta.textContent = `图片已生成：${buildImageFileName(item)}`;
        } catch (err) {
          els.meta.textContent = `图片下载失败: ${err.message}`;
        } finally {
          els.download_image_btn.disabled = false;
          if (!oldText.startsWith('图片')) {
            setTimeout(() => {
              if (els.meta.textContent.startsWith('图片已生成')) {
                els.meta.textContent = oldText;
              }
            }, 3000);
          }
        }
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      function stopJobPolling() {
        if (state.current_job_timer) {
          clearTimeout(state.current_job_timer);
          state.current_job_timer = null;
        }
      }

      async function pollDailySummaryJob(jobId) {
        stopJobPolling();
        try {
          const q = new URLSearchParams({ job_id: jobId });
          const res = await fetch(`${API_BASE}/api/news/daily-summaries/task?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '任务查询失败');

          const model = data.model || state.current_job_model || '';
          const progress = Number(data.progress || 0);
          const message = data.message || '处理中';
          els.meta.textContent = `生成中 ${progress}% · ${message} · 模型 ${model}`;

          if (data.status === 'done') {
            stopJobPolling();
            els.meta.textContent = `生成完成：${data.summary_date || ''}（模型 ${model}）`;
            state.summary_date = data.summary_date || '';
            els.summary_date.value = state.summary_date;
            await fetchData();
            const targetId = data.item?.id;
            if (targetId) {
              state.active_id = targetId;
              renderList();
              const cur = (state.items || []).find((x) => x.id === targetId) || data.item;
              renderDetail(cur);
            }
            els.gen_btn.disabled = false;
            state.current_job_id = '';
            return;
          }

          if (data.status === 'error') {
            stopJobPolling();
            els.meta.textContent = `生成失败: ${data.error || message || '未知错误'}`;
            els.gen_btn.disabled = false;
            state.current_job_id = '';
            return;
          }

          state.current_job_timer = setTimeout(() => {
            pollDailySummaryJob(jobId);
          }, 3000);
        } catch (err) {
          stopJobPolling();
          els.meta.textContent = `任务轮询失败: ${err.message}`;
          els.gen_btn.disabled = false;
          state.current_job_id = '';
        }
      }

      async function fetchData() {
        const q = new URLSearchParams({
          summary_date: state.summary_date,
          source_filter: state.source_filter,
          model: state.model,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/news/daily-summaries?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total_pages = data.total_pages || 1;
          state.total = data.total || 0;
          state.items = data.items || [];
          state.active_id = state.items[0]?.id || null;
          renderList();
          renderDetail(state.items[0] || null);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条日报总结，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          state.total_pages = 1;
          state.items = [];
          renderList();
          updatePager();
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      async function generateTodaySummary() {
        const genModel = els.gen_model.value || 'GPT-5.4';
        els.gen_btn.disabled = true;
        els.meta.textContent = `正在创建生成任务（模型 ${genModel}）...`;
        try {
          const q = new URLSearchParams({ model: genModel });
          const res = await fetch(`${API_BASE}/api/news/daily-summaries/generate?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '生成失败');
          state.current_job_id = data.job_id || '';
          state.current_job_model = genModel;
          if (!state.current_job_id) throw new Error('后端未返回 job_id');
          els.meta.textContent = `任务已创建，正在后台生成（模型 ${genModel}）...`;
          await pollDailySummaryJob(state.current_job_id);
        } catch (err) {
          stopJobPolling();
          els.meta.textContent = `生成失败: ${err.message}`;
          state.current_job_id = '';
          state.current_job_model = '';
          els.gen_btn.disabled = false;
        }
      }

      function search(resetPage = true) {
        state.summary_date = els.summary_date.value.trim();
        state.source_filter = els.source_filter.value.trim();
        state.model = els.model.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      async function refreshJobOnce(jobId) {
        const q = new URLSearchParams({ job_id: jobId });
        const res = await fetch(`${API_BASE}/api/news/daily-summaries/task?${q.toString()}`);
        const data = await res.json();
        if (!res.ok) return;
        if (data.status === 'done') {
          stopJobPolling();
          els.gen_btn.disabled = false;
          state.current_job_id = '';
          state.summary_date = data.summary_date || state.summary_date;
          els.summary_date.value = state.summary_date;
          await fetchData();
        } else if (data.status === 'error') {
          stopJobPolling();
          els.gen_btn.disabled = false;
          state.current_job_id = '';
          els.meta.textContent = `生成失败: ${data.error || data.message || '未知错误'}`;
        }
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            if (msg.event !== 'daily_summary_job_update') return;
            const payload = (msg.payload || {}).payload || {};
            const jobId = String(payload.job_id || '');
            if (!jobId) return;
            if (state.current_job_id && state.current_job_id === jobId) {
              await refreshJobOnce(jobId);
            } else if (payload.status === 'done') {
              await fetchData();
            }
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', () => search(true));
      els.gen_btn.addEventListener('click', generateTodaySummary);
      els.download_md_btn.addEventListener('click', downloadCurrentDetailAsMarkdown);
      els.download_image_btn.addEventListener('click', downloadCurrentDetailAsImage);
      [els.summary_date, els.source_filter].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      els.model.addEventListener('change', () => search(true));
      els.page_size.addEventListener('change', () => search(true));

      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
