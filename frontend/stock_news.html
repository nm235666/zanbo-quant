<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票相关新闻</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1160px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 170px 170px 1fr 110px 100px 120px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
      .tips {
        margin: 10px 0 0;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #334155;
        font-size: 13px;
      }
      .list { display: grid; gap: 10px; margin-top: 12px; }
      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }
      .item-title { margin: 0 0 8px; font-size: 17px; line-height: 1.45; }
      .item-title a { color: #0f172a; text-decoration: none; }
      .item-title a:hover { color: var(--primary); }
      .item-meta { margin: 0 0 8px; font-size: 12px; color: #64748b; line-height: 1.7; }
      .item-summary { margin: 0; line-height: 1.75; color: #334155; font-size: 14px; }
      .item-llm {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #dbe4ea;
        color: #1f2937;
        line-height: 1.75;
        font-size: 14px;
      }
      .tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
      .tag {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        background: #eef2ff;
        color: #3730a3;
        border: 1px solid #c7d2fe;
      }
      .tag-score { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
      .tag-impact { background: #eef2ff; color: #3730a3; border-color: #c7d2fe; }
      .tag-importance-极高 { background: #7f1d1d; color: #fff; border-color: #7f1d1d; }
      .tag-importance-高 { background: #b91c1c; color: #fff; border-color: #b91c1c; }
      .tag-importance-中 { background: #a16207; color: #fff; border-color: #a16207; }
      .tag-importance-低 { background: #0369a1; color: #fff; border-color: #0369a1; }
      .tag-importance-极低 { background: #475569; color: #fff; border-color: #475569; }
      .pager {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pager button { width: 90px; }
      @media (max-width: 980px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>股票相关新闻</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/news.html">国际新闻</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/cn_news.html">国内新闻</a>
          </div>
        </div>

        <div class="controls">
          <input id="ts_code" value="601100.SH" placeholder="股票代码，如 601100.SH" />
          <input id="company_name" placeholder="公司名，如 恒立液压" />
          <input id="keyword" placeholder="结果内关键词过滤（标题/摘要）" />
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
          <button id="fetch_btn">立即采集</button>
        </div>

        <div class="tips">
          此页面只展示已入库的个股新闻。采集脚本示例：
          <code>python3 /home/zanbo/zanbotest/fetch_stock_news_eastmoney_to_db.py --ts-code 601100.SH --page-size 50</code>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="list" id="list"></div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        ts_code: '601100.SH',
        company_name: '',
        keyword: '',
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
      };

      const els = {
        ts_code: document.getElementById('ts_code'),
        company_name: document.getElementById('company_name'),
        keyword: document.getElementById('keyword'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        fetch_btn: document.getElementById('fetch_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function parseTags(raw) {
        if (!raw) return [];
        try {
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (_) {
          return [];
        }
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="item"><p class="item-summary">暂无数据，请先运行入库脚本。</p></div>';
          return;
        }
        els.list.innerHTML = items.map((it) => {
          const tags = parseTags(it.relation_stock_tags_json);
          const importance = it.llm_finance_importance || '未评';
          return `
            <article class="item">
              <h3 class="item-title">
                <a href="${it.link || '#'}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title || '(无标题)')}</a>
              </h3>
              <p class="item-meta">
                股票: ${escapeHtml(it.ts_code || '')} ${escapeHtml(it.company_name || '')}
                ${it.pub_time ? ` | 发布时间: ${escapeHtml(it.pub_time)}` : ''}
                ${it.source ? ` | 来源: ${escapeHtml(it.source)}` : ''}
                ${it.comment_num != null ? ` | 评论数: ${escapeHtml(it.comment_num)}` : ''}
              </p>
              <p class="item-summary">${escapeHtml(it.summary || '')}</p>
              ${it.llm_summary ? `<div class="item-llm"><strong>LLM摘要：</strong>${escapeHtml(it.llm_summary)}</div>` : ''}
              <div class="tags">
                <span class="tag tag-importance-${escapeHtml(importance)}">重要程度: ${escapeHtml(importance)}</span>
                <span class="tag tag-score">系统评分: ${escapeHtml(it.llm_system_score ?? '-')}</span>
                <span class="tag tag-impact">财经影响: ${escapeHtml(it.llm_finance_impact_score ?? '-')}</span>
                ${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
              </div>
            </article>
          `;
        }).join('');
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          ts_code: state.ts_code,
          company_name: state.company_name,
          keyword: state.keyword,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/stock-news?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total_pages = data.total_pages || 1;
          state.total = data.total || 0;
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          els.meta.textContent = `请求失败: ${err.message}`;
          state.total_pages = 1;
          renderList([]);
          updatePager();
        }
      }

      async function fetchNow() {
        const tsCode = els.ts_code.value.trim().toUpperCase();
        const companyName = els.company_name.value.trim();
        const pageSize = Number(els.page_size.value || '20');
        if (!tsCode && !companyName) {
          els.meta.textContent = '请先输入股票代码或公司名';
          return;
        }
        els.fetch_btn.disabled = true;
        els.meta.textContent = '正在立即采集并评分，请稍候...';
        try {
          const q = new URLSearchParams({
            ts_code: tsCode,
            company_name: companyName,
            page_size: String(pageSize),
            score: '1',
            model: 'GPT-5.4',
          });
          const res = await fetch(`${API_BASE}/api/stock-news/fetch?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '采集失败');
          state.ts_code = tsCode;
          state.company_name = companyName;
          state.keyword = els.keyword.value.trim();
          state.page = 1;
          els.meta.textContent = `采集完成：返回 ${data.total || 0} 条，已刷新列表`;
          await fetchData();
        } catch (err) {
          els.meta.textContent = `采集失败: ${err.message}`;
        } finally {
          els.fetch_btn.disabled = false;
        }
      }

      function search(resetPage = true) {
        state.ts_code = els.ts_code.value.trim().toUpperCase();
        state.company_name = els.company_name.value.trim();
        state.keyword = els.keyword.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      function scheduleRefresh(delay = 600) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            const evt = msg.event || '';
            if (!['stock_news_update', 'stock_news_fetch_update', 'stock_news_score_update'].includes(evt)) return;
            const payload = (msg.payload || {}).payload || {};
            const tsCode = String(payload.ts_code || '').toUpperCase();
            if (state.ts_code && tsCode && tsCode !== state.ts_code) return;
            scheduleRefresh(400);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', () => search(true));
      els.fetch_btn.addEventListener('click', fetchNow);
      [els.ts_code, els.company_name, els.keyword].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      els.page_size.addEventListener('change', () => search(true));
      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
