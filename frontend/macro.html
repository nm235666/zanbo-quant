<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宏观数据看板</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 100px 140px 140px 100px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
      .box { border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: #fff; }
      .table-wrap { overflow: auto; max-height: 360px; border: 1px solid var(--border); border-radius: 10px; }
      table { width: 100%; border-collapse: collapse; min-width: 820px; }
      th, td { padding: 8px 10px; border-bottom: 1px solid #eef2f7; text-align: left; white-space: nowrap; font-size: 13px; }
      th { position: sticky; top: 0; background: #f8fafc; }
      #lineChart { width: 100%; height: 360px; }
      .grid { display: grid; gap: 10px; margin-top: 10px; }
      @media (max-width: 960px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>宏观数据看板</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/llm_trend.html">LLM走势分析</a>
          </div>
        </div>

        <div class="controls">
          <select id="indicator"></select>
          <select id="freq">
            <option value="">全部频率</option>
            <option value="D">日频(D)</option>
            <option value="W">周频(W)</option>
            <option value="M">月频(M)</option>
            <option value="Q">季频(Q)</option>
            <option value="Y">年频(Y)</option>
          </select>
          <input id="period_start" placeholder="起始周期，如 202001" />
          <input id="period_end" placeholder="结束周期，如 202512" />
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>

        <div class="grid">
          <div class="box">
            <canvas id="lineChart"></canvas>
          </div>
          <div class="box table-wrap">
            <table>
              <thead>
                <tr>
                  <th>指标代码</th>
                  <th>频率</th>
                  <th>统计周期</th>
                  <th>指标值</th>
                  <th>数据来源</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const els = {
        indicator: document.getElementById('indicator'),
        freq: document.getElementById('freq'),
        period_start: document.getElementById('period_start'),
        period_end: document.getElementById('period_end'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        tbody: document.getElementById('tbody'),
        lineChart: document.getElementById('lineChart'),
      };

      let chart;

      function initChart() {
        const ctx = els.lineChart.getContext('2d');
        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: [],
            datasets: [{
              label: '指标值',
              data: [],
              borderColor: '#0f766e',
              backgroundColor: 'rgba(15, 118, 110, 0.08)',
              fill: true,
              tension: 0.2,
              pointRadius: 1.5,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { ticks: { maxTicksLimit: 12 } },
              y: { beginAtZero: false },
            },
            plugins: {
              legend: { display: true },
            },
          },
        });
      }

      function setChart(items) {
        const sorted = [...items].sort((a, b) => String(a.period).localeCompare(String(b.period)));
        chart.data.labels = sorted.map((x) => x.period);
        chart.data.datasets[0].data = sorted.map((x) => Number(x.value));
        chart.data.datasets[0].label = sorted[0]?.indicator_code || 'value';
        chart.update();
      }

      const FREQ_LABELS = {
        D: '日频(D)',
        W: '周频(W)',
        M: '月频(M)',
        Q: '季频(Q)',
        Y: '年频(Y)',
      };

      function renderTable(items) {
        els.tbody.innerHTML = items.map((it) => `
          <tr>
            <td>${it.indicator_code || ''}</td>
            <td>${FREQ_LABELS[it.freq] || (it.freq || '')}</td>
            <td>${it.period || ''}</td>
            <td>${it.value ?? ''}</td>
            <td>${it.source || ''}</td>
          </tr>
        `).join('');
      }

      async function loadIndicators() {
        try {
          const res = await fetch(`${API_BASE}/api/macro/indicators`);
          const data = await res.json();
          const items = data.items || [];
          const opts = ['<option value="">选择指标（可选）</option>']
            .concat(items.map((x) => `<option value="${x.indicator_code}">${x.indicator_name || x.indicator_code} [${x.indicator_code}] ${FREQ_LABELS[x.freq] || x.freq}，数据点${x.points}</option>`));
          els.indicator.innerHTML = opts.join('');
        } catch (e) {
          els.meta.textContent = `加载指标失败: ${e.message}`;
        }
      }

      async function search() {
        const q = new URLSearchParams({
          indicator_code: els.indicator.value,
          freq: els.freq.value,
          period_start: els.period_start.value.trim(),
          period_end: els.period_end.value.trim(),
          page: '1',
          page_size: '500',
        });

        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/macro?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          const items = data.items || [];
          renderTable(items);
          setChart(items);
          els.meta.textContent = `共 ${data.total || 0} 条，展示 ${items.length} 条，API: ${API_BASE}`;
        } catch (e) {
          els.meta.textContent = `请求失败: ${e.message}`;
          renderTable([]);
          setChart([]);
        }
      }

      els.search_btn.addEventListener('click', search);
      [els.period_start, els.period_end].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search();
        });
      });

      initChart();
      loadIndicators().then(search);
    </script>
  </body>
</html>
