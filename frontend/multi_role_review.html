<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM 多角色公司分析</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dff7f3 0%, transparent 38%),
          radial-gradient(circle at 100% 100%, #e5edff 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1180px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 180px 110px 180px 1fr 100px;
        gap: 10px;
      }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
      .search-wrap {
        position: relative;
      }
      .suggestions {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        z-index: 10;
        display: none;
        max-height: 260px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      }
      .suggestion-item {
        padding: 10px 12px;
        border-bottom: 1px solid #eef2f7;
        cursor: pointer;
      }
      .suggestion-item:last-child {
        border-bottom: none;
      }
      .suggestion-item:hover {
        background: #f8fafc;
      }
      .suggestion-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .suggestion-name {
        font-weight: 600;
        color: #0f172a;
      }
      .suggestion-code {
        color: #0f766e;
        font-size: 12px;
      }
      .suggestion-meta {
        margin-top: 4px;
        font-size: 12px;
        color: #64748b;
      }
      .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
      .box { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: #fff; }
      pre { margin: 0; white-space: pre-wrap; line-height: 1.6; }

      .markdown-body {
        color: #1f2937;
        line-height: 1.9;
        font-size: 15px;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        margin: 10px 0 8px;
        line-height: 1.45;
        color: #0f172a;
      }
      .markdown-body h1 { font-size: 22px; }
      .markdown-body h2 { font-size: 19px; }
      .markdown-body h3 { font-size: 17px; }
      .markdown-body h4 { font-size: 16px; }
      .markdown-body p { margin: 8px 0; }
      .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 22px; }
      .markdown-body li { margin: 5px 0; }
      .markdown-body blockquote {
        margin: 10px 0;
        padding: 6px 12px;
        border-left: 4px solid #94a3b8;
        color: #334155;
        background: #f8fafc;
      }
      .markdown-body code {
        background: #f1f5f9;
        border-radius: 6px;
        padding: 1px 6px;
        font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
        font-size: 13px;
      }
      .markdown-body pre {
        background: #0b1220;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 10px 12px;
        overflow: auto;
        line-height: 1.6;
      }
      .markdown-body pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }
      .data-dimensions {
        margin: 0 0 14px;
        padding: 12px 14px;
        border: 1px solid #dbe4ea;
        border-radius: 14px;
        background: linear-gradient(135deg, #f7fcfb 0%, #f8fafc 100%);
      }
      .data-dimensions-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .data-dimensions-title {
        font-size: 14px;
        font-weight: 700;
        color: #0f172a;
      }
      .data-dimensions-count {
        font-size: 12px;
        color: #475569;
      }
      .coverage {
        margin: 2px 0 12px;
      }
      .coverage-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .coverage-label {
        font-size: 12px;
        color: #334155;
      }
      .coverage-bar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: #e2e8f0;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      .coverage-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f766e 0%, #14b8a6 100%);
        transition: width 0.25s ease;
      }
      .dimension-sections {
        display: grid;
        gap: 10px;
      }
      .dimension-section {
        border-top: 1px solid #e2e8f0;
        padding-top: 10px;
      }
      .dimension-section:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      .dimension-section-title {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.04em;
        color: #475569;
      }
      .tag-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .dim-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 32px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }
      .dim-tag strong {
        font-size: 12px;
        font-weight: 700;
      }
      .dim-tag-used {
        background: #ecfdf5;
        border-color: #a7f3d0;
        color: #065f46;
      }
      .dim-tag-empty {
        background: #f8fafc;
        border-color: #cbd5e1;
        color: #64748b;
      }
      .dim-tag-error {
        background: #fff7ed;
        border-color: #fdba74;
        color: #9a3412;
      }
      .dim-tag-name {
        font-weight: 600;
      }
      .dim-tag-note {
        opacity: 0.85;
      }
      .dim-tag[data-tooltip] {
        cursor: default;
      }
      .box-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 8px;
      }
      .box-header h3 {
        margin: 0;
      }
      .ghost-btn {
        height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .ghost-btn:hover {
        background: #eef2f7;
      }
      .ghost-btn:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      .download-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .role-downloads {
        margin: 10px 0 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      @media (max-width: 980px) {
        .controls { grid-template-columns: 1fr 1fr; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>LLM 多角色公司分析</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/prices.html">日线页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/llm_trend.html">单股走势分析</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/macro.html">宏观看板</a>
          </div>
        </div>

        <div class="controls">
          <div class="search-wrap">
            <input id="ts_code" value="000001.SZ" placeholder="股票代码或简称，如 000001.SZ / 平安银行" autocomplete="off" />
            <div id="stock_suggestions" class="suggestions"></div>
          </div>
          <input id="lookback" value="120" placeholder="回看天数" />
          <select id="model">
            <option value="GPT-5.4">GPT-5.4</option>
            <option value="kimi-k2.5">kimi-k2.5</option>
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="deepseek-reasoner">deepseek-reasoner</option>
          </select>
          <input id="roles" value="宏观经济分析师,股票分析师,国际资本分析师,汇率分析师" placeholder="角色，逗号分隔" />
          <button id="run_btn">分析</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>

        <div class="grid">
          <div class="box">
            <div class="box-header">
              <h3>多角色分析结论</h3>
              <div class="download-actions">
                <button id="download_btn" class="ghost-btn" disabled>下载整篇 .md</button>
              </div>
            </div>
            <div id="role_downloads" class="role-downloads"></div>
            <div id="data_dimensions" class="data-dimensions">
              <div class="data-dimensions-header">
                <div class="data-dimensions-title">本次分析使用的数据维度</div>
                <div id="data_dimensions_count" class="data-dimensions-count">等待分析</div>
              </div>
              <div class="coverage">
                <div class="coverage-top">
                  <div class="coverage-label">数据覆盖率</div>
                  <div id="data_dimensions_ratio" class="coverage-label">0%</div>
                </div>
                <div class="coverage-bar">
                  <div id="data_dimensions_bar" class="coverage-bar-fill"></div>
                </div>
              </div>
              <div class="dimension-sections">
                <div class="dimension-section">
                  <h4 class="dimension-section-title">已使用</h4>
                  <div id="data_dimensions_tags_used" class="tag-group"></div>
                </div>
                <div class="dimension-section">
                  <h4 class="dimension-section-title">暂缺</h4>
                  <div id="data_dimensions_tags_missing" class="tag-group"></div>
                </div>
              </div>
            </div>
            <div id="analysis" class="markdown-body">
              <p>（点击“分析”开始）</p>
            </div>
          </div>
          <div class="box">
            <h3 style="margin:0 0 8px;">上下文摘要</h3>
            <pre id="context">-</pre>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const els = {
        ts_code: document.getElementById('ts_code'),
        stock_suggestions: document.getElementById('stock_suggestions'),
        lookback: document.getElementById('lookback'),
        model: document.getElementById('model'),
        roles: document.getElementById('roles'),
        run_btn: document.getElementById('run_btn'),
        download_btn: document.getElementById('download_btn'),
        role_downloads: document.getElementById('role_downloads'),
        meta: document.getElementById('meta'),
        analysis: document.getElementById('analysis'),
        context: document.getElementById('context'),
        data_dimensions: document.getElementById('data_dimensions'),
        data_dimensions_count: document.getElementById('data_dimensions_count'),
        data_dimensions_ratio: document.getElementById('data_dimensions_ratio'),
        data_dimensions_bar: document.getElementById('data_dimensions_bar'),
        data_dimensions_tags_used: document.getElementById('data_dimensions_tags_used'),
        data_dimensions_tags_missing: document.getElementById('data_dimensions_tags_missing'),
      };
      let currentJobId = '';
      let latestAnalysisMarkdown = '';
      let latestAnalysisSections = [];
      let stockSuggestionTimer = null;
      let currentStockSuggestions = [];
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;

      const STATUS_LABELS = {
        L: '上市(L)',
        D: '退市(D)',
        P: '暂停上市(P)',
      };

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      const DIMENSION_DEFS = [
        { key: 'company_profile', label: '公司画像', detail: (v) => v?.name ? `${v.name}` : '' },
        { key: 'price_summary', label: '日线价格', detail: (v) => v?.latest?.trade_date ? `最新 ${v.latest.trade_date}` : '' },
        { key: 'financial_summary', label: '财务数据', detail: (v) => v?.latest_report_period ? `报告期 ${v.latest_report_period}` : '' },
        { key: 'valuation_summary', label: '估值水平', detail: (v) => v?.trade_date ? `估值日 ${v.trade_date}` : '' },
        { key: 'capital_flow_summary', label: '个股/市场资金流', detail: (v) => v?.stock_flow?.latest?.trade_date || v?.market_flow ? '资金流已接入' : '' },
        { key: 'event_summary', label: '公司事件', detail: (v) => Array.isArray(v?.recent_events) ? `${v.recent_events.length} 条事件` : '' },
        { key: 'stock_news_summary', label: '股票新闻', detail: (v) => Array.isArray(v?.recent_items) ? `${v.recent_items.length} 条新闻` : '' },
        { key: 'macro_context', label: '宏观指标', detail: (v) => v?.asof ? `截至 ${v.asof}` : '' },
        { key: 'fx_context', label: '汇率数据', detail: (v) => Object.keys(v || {}).length ? `${Object.keys(v).length} 组汇率` : '' },
        { key: 'rate_spread_context', label: '利率曲线/利差', detail: (v) => v?.spread_date || v?.curve_date ? `${v.spread_date || v.curve_date}` : '' },
        { key: 'governance_summary', label: '公司治理', detail: (v) => v?.asof_date ? `治理日 ${v.asof_date}` : '' },
        { key: 'risk_summary', label: '风险情景', detail: (v) => v?.scenario_date ? `情景日 ${v.scenario_date}` : '' },
      ];

      function hasContent(value) {
        if (value == null) return false;
        if (Array.isArray(value)) return value.length > 0;
        if (typeof value === 'object') return Object.keys(value).length > 0;
        if (typeof value === 'string') return value.trim().length > 0;
        return true;
      }

      function renderDataDimensions(ctx, errorText = '') {
        if (errorText) {
          els.data_dimensions_count.textContent = '接口请求失败';
          els.data_dimensions_ratio.textContent = '0%';
          els.data_dimensions_bar.style.width = '0%';
          els.data_dimensions_tags_used.innerHTML = `<span class="dim-tag dim-tag-error" data-tooltip="${errorText}"><strong>异常</strong><span class="dim-tag-name">未能获取分析上下文</span><span class="dim-tag-note">${errorText}</span></span>`;
          els.data_dimensions_tags_missing.innerHTML = '<span class="dim-tag dim-tag-empty"><strong>待重试</strong><span class="dim-tag-name">请检查接口或模型状态</span></span>';
          return;
        }

        if (!ctx || !Object.keys(ctx).length) {
          els.data_dimensions_count.textContent = '等待分析';
          els.data_dimensions_ratio.textContent = '0%';
          els.data_dimensions_bar.style.width = '0%';
          els.data_dimensions_tags_used.innerHTML = '<span class="dim-tag dim-tag-empty"><strong>待分析</strong><span class="dim-tag-name">尚未加载数据维度</span></span>';
          els.data_dimensions_tags_missing.innerHTML = '<span class="dim-tag dim-tag-empty"><strong>待分析</strong><span class="dim-tag-name">分析后显示缺失项</span></span>';
          return;
        }

        let usedCount = 0;
        const usedHtml = [];
        const missingHtml = [];
        DIMENSION_DEFS.forEach((item) => {
          const value = ctx[item.key];
          const used = hasContent(value);
          if (used) usedCount += 1;
          const note = item.detail ? item.detail(value) : '';
          const statusText = used ? '已使用' : '暂缺';
          const cls = used ? 'dim-tag-used' : 'dim-tag-empty';
          const tooltip = `${item.label}${note ? ` | ${note}` : ''}`;
          const html = `<span class="dim-tag ${cls}" title="${tooltip}" data-tooltip="${tooltip}">
            <strong>${statusText}</strong>
            <span class="dim-tag-name">${item.label}</span>
            ${note ? `<span class="dim-tag-note">${note}</span>` : ''}
          </span>`;
          if (used) usedHtml.push(html);
          else missingHtml.push(html);
        });

        const ratio = Math.round((usedCount / DIMENSION_DEFS.length) * 100);
        els.data_dimensions_count.textContent = `已接入 ${usedCount} / ${DIMENSION_DEFS.length} 项`;
        els.data_dimensions_ratio.textContent = `${ratio}%`;
        els.data_dimensions_bar.style.width = `${ratio}%`;
        els.data_dimensions_tags_used.innerHTML = usedHtml.join('') || '<span class="dim-tag dim-tag-empty"><strong>无</strong><span class="dim-tag-name">本次暂无已使用维度</span></span>';
        els.data_dimensions_tags_missing.innerHTML = missingHtml.join('') || '<span class="dim-tag dim-tag-used"><strong>完整</strong><span class="dim-tag-name">本次无缺失维度</span></span>';
      }

      function renderAnalysis(text, roleSections = []) {
        const raw = (text || '').trim();
        latestAnalysisMarkdown = raw;
        latestAnalysisSections = normalizeRoleSections(roleSections, parseRolesInput(els.roles.value), raw);
        els.download_btn.disabled = !raw;
        renderRoleDownloadButtons();
        if (!raw) {
          els.analysis.innerHTML = '<p>暂无分析结果</p>';
          return;
        }
        marked.setOptions({
          gfm: true,
          breaks: true,
        });
        els.analysis.innerHTML = marked.parse(raw);
      }

      function parseRolesInput(raw) {
        return String(raw || '')
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function normalizeRoleSections(roleSections, roles, fullMarkdown) {
        const normalizedRoles = (roles || []).filter(Boolean);
        const sections = Array.isArray(roleSections) ? roleSections : [];
        return normalizedRoles.map((role) => {
          const found = sections.find((item) => item && item.role === role);
          if (found && String(found.content || '').trim()) {
            return found;
          }
          return {
            role,
            content: `## ${role}\n\n未收到后端返回的该角色独立内容，以下附上完整分析原文供参考。\n\n${String(fullMarkdown || '').trim()}`,
            matched: false,
          };
        });
      }

      function fmtContext(ctx, roles) {
        if (!ctx) return '-';
        const p = ctx.company_profile || {};
        const s = ctx.price_summary || {};
        const m = s.metrics || {};
        const l = s.latest || {};
        return [
          `股票: ${p.ts_code || ''} ${p.name || ''}`,
          `行业: ${p.industry || ''} / 地区: ${p.area || ''} / 市场: ${p.market || ''}`,
          `状态: ${STATUS_LABELS[p.list_status] || (p.list_status || '')} / 上市日: ${p.list_date || ''}`,
          `样本数: ${s.samples || 0}`,
          `区间: ${s.date_range?.start || ''} ~ ${s.date_range?.end || ''}`,
          `最新收盘: ${l.close ?? ''} (${l.trade_date || ''})`,
          `区间收益(%): ${m.total_return_pct ?? ''}`,
          `MA5/10/20/60: ${m.ma5 ?? ''} / ${m.ma10 ?? ''} / ${m.ma20 ?? ''} / ${m.ma60 ?? ''}`,
          `距MA20(%): ${m.distance_to_ma20_pct ?? ''}`,
          `年化波动(%): ${m.annualized_volatility_pct ?? ''}`,
          `角色: ${(roles || []).join(', ')}`,
        ].join('\n');
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function buildDownloadFileName() {
        const tsCode = (els.ts_code.value || 'UNKNOWN').trim().toUpperCase() || 'UNKNOWN';
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        return `${tsCode}${yyyy}${mm}${dd}LLM 多角色公司分析.md`;
      }

      function buildRoleDownloadFileName(role) {
        const tsCode = (els.ts_code.value || 'UNKNOWN').trim().toUpperCase() || 'UNKNOWN';
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        return `${tsCode}${yyyy}${mm}${dd}${role}结论.md`;
      }

      function triggerMarkdownDownload(content, fileName) {
        const text = String(content || '').trim();
        if (!text) return;
        const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function downloadAnalysis() {
        const content = (latestAnalysisMarkdown || '').trim();
        if (!content) return;
        triggerMarkdownDownload(content, buildDownloadFileName());
      }

      function downloadRoleAnalysis(role) {
        const sections = latestAnalysisSections.length
          ? latestAnalysisSections
          : normalizeRoleSections([], parseRolesInput(els.roles.value), latestAnalysisMarkdown);
        const section = sections.find((item) => item.role === role);
        if (!section) return;
        triggerMarkdownDownload(section.content, buildRoleDownloadFileName(role));
      }

      function renderRoleDownloadButtons() {
        const roles = parseRolesInput(els.roles.value);
        if (!roles.length || !latestAnalysisMarkdown.trim()) {
          els.role_downloads.innerHTML = '';
          return;
        }
        const sectionMap = new Map((latestAnalysisSections || []).map((item) => [item.role, item]));
        els.role_downloads.innerHTML = roles.map((role) => {
          const item = sectionMap.get(role);
          const title = item?.matched === false
            ? '该角色未稳定切分，下载内容将附带公共结论或原文兜底'
            : `下载 ${role} 结论`;
          return `
          <button type="button" class="ghost-btn" title="${escapeHtml(title)}" data-role-download="${escapeHtml(role)}">下载 ${escapeHtml(role)} .md</button>
        `;
        }).join('');
        els.role_downloads.querySelectorAll('[data-role-download]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const role = btn.getAttribute('data-role-download') || '';
            downloadRoleAnalysis(role);
          });
        });
      }

      function renderStockSuggestions(items) {
        currentStockSuggestions = items || [];
        if (!currentStockSuggestions.length) {
          els.stock_suggestions.style.display = 'none';
          els.stock_suggestions.innerHTML = '';
          return;
        }
        els.stock_suggestions.innerHTML = currentStockSuggestions.map((item, idx) => `
          <div class="suggestion-item" data-suggestion-index="${idx}">
            <div class="suggestion-main">
              <span class="suggestion-name">${escapeHtml(item.name || '')}</span>
              <span class="suggestion-code">${escapeHtml(item.ts_code || '')}</span>
            </div>
            <div class="suggestion-meta">${escapeHtml(item.market || '-')} / ${escapeHtml(item.area || '-')} / ${escapeHtml(item.industry || '-')}</div>
          </div>
        `).join('');
        els.stock_suggestions.style.display = 'block';
        els.stock_suggestions.querySelectorAll('[data-suggestion-index]').forEach((node) => {
          node.addEventListener('click', () => {
            const idx = Number(node.getAttribute('data-suggestion-index'));
            const item = currentStockSuggestions[idx];
            if (!item) return;
            els.ts_code.value = item.ts_code || '';
            els.meta.textContent = `已选择股票：${item.ts_code} ${item.name || ''}`;
            els.stock_suggestions.style.display = 'none';
          });
        });
      }

      async function searchStockSuggestions(keyword) {
        const q = String(keyword || '').trim();
        if (!q || q.length < 2) {
          renderStockSuggestions([]);
          return;
        }
        try {
          const params = new URLSearchParams({
            keyword: q,
            status: 'L',
            page: '1',
            page_size: '8',
          });
          const res = await fetch(`${API_BASE}/api/stocks?${params.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '股票查询失败');
          renderStockSuggestions(data.items || []);
        } catch (_) {
          renderStockSuggestions([]);
        }
      }

      async function resolveTsCode(rawInput) {
        const input = String(rawInput || '').trim();
        if (!input) {
          throw new Error('请输入股票代码或简称');
        }
        if (/^\d{6}\.(SZ|SH|BJ)$/i.test(input)) {
          return { ts_code: input.toUpperCase(), matched_name: '' };
        }
        const params = new URLSearchParams({
          keyword: input,
          status: 'L',
          page: '1',
          page_size: '10',
        });
        const res = await fetch(`${API_BASE}/api/stocks?${params.toString()}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '股票简称查询失败');
        const items = data.items || [];
        if (!items.length) {
          throw new Error(`未找到股票：${input}`);
        }
        const exactName = items.find((item) => (item.name || '').trim() === input);
        const exactSymbol = items.find((item) => (item.symbol || '').trim() === input);
        const match = exactName || exactSymbol || items[0];
        return {
          ts_code: String(match.ts_code || '').toUpperCase(),
          matched_name: String(match.name || ''),
        };
      }

      async function pollMultiRoleJob(jobId, baseMetaText) {
        const startedAt = Date.now();
        const timeoutMs = 5 * 60 * 1000;
        while (Date.now() - startedAt < timeoutMs) {
          if (currentJobId !== jobId) {
            return;
          }
          const q = new URLSearchParams({ job_id: jobId });
          const res = await fetch(`${API_BASE}/api/llm/multi-role/task?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '任务查询失败');

          const progress = Number(data.progress || 0);
          const stageText = data.message || data.stage || '分析中';
          els.meta.textContent = `${baseMetaText}，${stageText}（${progress}%）`;

          if (data.context) {
            els.context.textContent = fmtContext(data.context, data.roles);
            renderDataDimensions(data.context);
          }

          if (data.status === 'done') {
            renderAnalysis(data.analysis || '', data.role_sections || []);
            els.meta.textContent = `分析完成：${data.ts_code} ${data.name || ''}，模型 ${data.model}`;
            return;
          }

          if (data.status === 'error') {
            throw new Error(data.error || '分析失败');
          }

          await sleep(2500);
        }
        throw new Error('分析超时，请稍后重试');
      }

      async function refreshCurrentJobOnce() {
        if (!currentJobId) return;
        const q = new URLSearchParams({ job_id: currentJobId });
        const res = await fetch(`${API_BASE}/api/llm/multi-role/task?${q.toString()}`);
        const data = await res.json();
        if (!res.ok) return;
        if (data.context) {
          els.context.textContent = fmtContext(data.context, data.roles);
          renderDataDimensions(data.context);
        }
        if (data.status === 'done') {
          renderAnalysis(data.analysis || '', data.role_sections || []);
          els.meta.textContent = `分析完成：${data.ts_code} ${data.name || ''}，模型 ${data.model}`;
          currentJobId = '';
        } else if (data.status === 'error') {
          els.meta.textContent = `请求失败: ${data.error || data.message || '分析失败'}`;
          currentJobId = '';
        }
      }

      async function run() {
        const rawStockInput = els.ts_code.value.trim();
        const lookback = Number(els.lookback.value.trim() || '120');
        const model = els.model.value;
        const roles = els.roles.value.trim();
        if (!rawStockInput) {
          els.meta.textContent = '请输入股票代码或简称';
          return;
        }
        els.run_btn.disabled = true;
        els.download_btn.disabled = true;
        els.role_downloads.innerHTML = '';
        currentJobId = '';
        els.meta.textContent = '正在准备分析上下文...';
        els.analysis.innerHTML = '<p>正在创建分析任务，并准备上下文...</p>';
        els.context.textContent = '';
        renderDataDimensions(null);

        try {
          const stock = await resolveTsCode(rawStockInput);
          const tsCode = stock.ts_code;
          els.ts_code.value = tsCode;
          const q = new URLSearchParams({
            ts_code: tsCode,
            lookback: String(lookback),
            model,
            roles,
          });
          const res = await fetch(`${API_BASE}/api/llm/multi-role/start?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          currentJobId = data.job_id || '';
          const matchHint = stock.matched_name && stock.matched_name !== data.name ? `（简称匹配：${stock.matched_name}）` : '';
          els.meta.textContent = `任务已创建：${data.ts_code} ${data.name || ''}${matchHint}，模型 ${data.model}`;
          renderAnalysis('', []);
          els.context.textContent = fmtContext(data.context, data.roles);
          renderDataDimensions(data.context);
          els.analysis.innerHTML = '<p>上下文已准备完成，正在等待大模型输出分析结论...</p>';
          await pollMultiRoleJob(currentJobId, `任务进行中：${data.ts_code} ${data.name || ''}，模型 ${data.model}`);
        } catch (err) {
          els.meta.textContent = `请求失败: ${err.message}`;
          renderAnalysis('', []);
          els.context.textContent = '';
          renderDataDimensions(null, err.message || '请求失败');
        } finally {
          els.run_btn.disabled = false;
        }
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app' || msg.event !== 'multi_role_job_update') return;
            const payload = (msg.payload || {}).payload || {};
            const jobId = String(payload.job_id || '');
            if (!jobId || !currentJobId || jobId !== currentJobId) return;
            await refreshCurrentJobOnce();
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      renderDataDimensions(null);

      els.run_btn.addEventListener('click', run);
      els.download_btn.addEventListener('click', downloadAnalysis);
      els.ts_code.addEventListener('input', () => {
        clearTimeout(stockSuggestionTimer);
        const keyword = els.ts_code.value.trim();
        if (/^\d{6}\.(SZ|SH|BJ)$/i.test(keyword) || !keyword) {
          renderStockSuggestions([]);
          return;
        }
        stockSuggestionTimer = setTimeout(() => searchStockSuggestions(keyword), 250);
      });
      document.addEventListener('click', (event) => {
        if (!els.stock_suggestions.contains(event.target) && event.target !== els.ts_code) {
          els.stock_suggestions.style.display = 'none';
        }
      });
      [els.ts_code, els.lookback, els.roles].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') run();
        });
      });
      connectRealtime();
    </script>
  </body>
</html>
