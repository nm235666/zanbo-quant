<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据源监控</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
        --ok-bg: #ecfdf5;
        --ok-text: #065f46;
        --warn-bg: #fff7ed;
        --warn-text: #9a3412;
        --error-bg: #fef2f2;
        --error-text: #991b1b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dff7f3 0%, transparent 36%),
          radial-gradient(circle at 100% 100%, #e5edff 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1280px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      button {
        height: 40px;
        border: none;
        border-radius: 10px;
        padding: 0 14px;
        font-size: 14px;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }
      button:hover { background: var(--primary-dark); }
      .meta { margin-top: 10px; color: var(--muted); font-size: 13px; }
      .summary-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
      }
      .stat-card {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }
      .stat-label { font-size: 12px; color: var(--muted); }
      .stat-value { margin-top: 6px; font-size: 28px; font-weight: 700; }
      .sections {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 12px;
      }
      .box {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #fff;
        padding: 14px;
      }
      .box h3 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .card-list { display: grid; gap: 10px; }
      .item-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      }
      .item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .item-title { font-size: 16px; font-weight: 700; }
      .item-meta { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.7; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge-ok { background: var(--ok-bg); color: var(--ok-text); }
      .badge-warn { background: var(--warn-bg); color: var(--warn-text); }
      .badge-error { background: var(--error-bg); color: var(--error-text); }
      .kv-list { display: grid; gap: 8px; }
      .kv {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
      }
      .job-list { display: grid; gap: 10px; }
      .logs { display: grid; gap: 10px; }
      .log-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: #fff;
      }
      .log-head {
        padding: 10px 12px;
        background: #f8fafc;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      pre {
        margin: 0;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0b1220;
        color: #dbeafe;
        min-height: 120px;
        max-height: 260px;
        overflow: auto;
        line-height: 1.65;
        font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
        font-size: 12px;
      }
      @media (max-width: 1024px) {
        .summary-grid { grid-template-columns: 1fr 1fr 1fr; }
        .sections { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .summary-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>数据源监控</h1>
          <div class="actions">
            <a class="link" href="/index.html">返回首页</a>
            <a class="link" href="/news.html">国际新闻</a>
            <a class="link" href="/cn_news.html">国内新闻</a>
            <button id="refresh_btn">立即刷新</button>
          </div>
        </div>
        <div class="meta" id="meta">准备就绪</div>

        <div class="summary-grid">
          <div class="stat-card">
            <div class="stat-label">数据源正常</div>
            <div class="stat-value" id="stat_source_ok">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">数据源异常/延迟</div>
            <div class="stat-value" id="stat_source_bad">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">后台进程正常</div>
            <div class="stat-value" id="stat_process_ok">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">最近刷新时间</div>
            <div class="stat-value" id="stat_now" style="font-size:20px;">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">编排成功</div>
            <div class="stat-value" id="stat_job_success">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">编排失败/运行中</div>
            <div class="stat-value" id="stat_job_bad">-</div>
          </div>
        </div>

        <div class="sections">
          <div class="box">
            <h3>数据源状态</h3>
            <div id="sources" class="card-list"></div>
          </div>
          <div class="box">
            <h3>运行概况</h3>
            <div id="processes" class="card-list"></div>
            <h3 style="margin-top:16px;">编排任务</h3>
            <div id="jobs" class="job-list"></div>
            <h3 style="margin-top:16px;">数据量概况</h3>
            <div id="row_counts" class="kv-list"></div>
          </div>
        </div>

        <div class="box" style="margin-top:12px;">
          <h3>最近日志</h3>
          <div id="logs" class="logs"></div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const els = {
        meta: document.getElementById('meta'),
        refresh_btn: document.getElementById('refresh_btn'),
        stat_source_ok: document.getElementById('stat_source_ok'),
        stat_source_bad: document.getElementById('stat_source_bad'),
        stat_process_ok: document.getElementById('stat_process_ok'),
        stat_now: document.getElementById('stat_now'),
        stat_job_success: document.getElementById('stat_job_success'),
        stat_job_bad: document.getElementById('stat_job_bad'),
        sources: document.getElementById('sources'),
        processes: document.getElementById('processes'),
        jobs: document.getElementById('jobs'),
        row_counts: document.getElementById('row_counts'),
        logs: document.getElementById('logs'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function badgeClass(status) {
        if (status === 'ok') return 'badge badge-ok';
        if (status === 'warn') return 'badge badge-warn';
        return 'badge badge-error';
      }

      function renderSources(items) {
        els.sources.innerHTML = (items || []).map((it) => `
          <article class="item-card">
            <div class="item-head">
              <div class="item-title">${escapeHtml(it.name)}</div>
              <span class="${badgeClass(it.status)}">${escapeHtml(it.status_text)}</span>
            </div>
            <div class="item-meta">
              分类: ${escapeHtml(it.category || '-')}<br />
              最近数据时间: ${escapeHtml(it.last_update || '-')}<br />
              说明: ${escapeHtml(it.detail || '-')}
            </div>
          </article>
        `).join('') || '<div class="item-card">暂无数据</div>';
      }

      function renderProcesses(items) {
        els.processes.innerHTML = (items || []).map((it) => `
          <article class="item-card">
            <div class="item-head">
              <div class="item-title">${escapeHtml(it.name)}</div>
              <span class="${badgeClass(it.status)}">${escapeHtml(it.status_text)}</span>
            </div>
            <div class="item-meta">
              最近活动: ${escapeHtml(it.last_update || '-')}<br />
              说明: ${escapeHtml(it.detail || '-')}
            </div>
          </article>
        `).join('') || '<div class="item-card">暂无数据</div>';
      }

      function renderJobs(items) {
        els.jobs.innerHTML = (items || []).map((it) => {
          const badge = it.status === 'success' ? 'ok' : (it.status === 'running' ? 'warn' : 'error');
          return `
          <article class="item-card">
            <div class="item-head">
              <div class="item-title">${escapeHtml(it.job_key || '-')}</div>
              <span class="${badgeClass(badge)}">${escapeHtml(it.status || '-')}</span>
            </div>
            <div class="item-meta">
              触发方式: ${escapeHtml(it.trigger_mode || '-')}<br />
              开始时间: ${escapeHtml(it.started_at || '-')}<br />
              结束时间: ${escapeHtml(it.finished_at || '-')}<br />
              耗时: ${escapeHtml(it.duration_seconds ?? '-')} 秒
            </div>
          </article>
        `;
        }).join('') || '<div class="item-card">暂无数据</div>';
      }

      function renderCounts(rowCounts) {
        const entries = Object.entries(rowCounts || {});
        els.row_counts.innerHTML = entries.map(([k, v]) => `
          <div class="kv">
            <span>${escapeHtml(k)}</span>
            <strong>${escapeHtml(v)}</strong>
          </div>
        `).join('') || '<div class="kv"><span>暂无</span><strong>-</strong></div>';
      }

      function renderLogs(items) {
        els.logs.innerHTML = (items || []).map((it) => `
          <section class="log-card">
            <div class="log-head">
              ${escapeHtml(it.name)} | 最后更新: ${escapeHtml(it.last_update || '-')} | ${escapeHtml(it.path || '')}
            </div>
            <pre>${escapeHtml(it.tail || '暂无日志')}</pre>
          </section>
        `).join('') || '<section class="log-card"><div class="log-head">暂无日志</div><pre>-</pre></section>';
      }

      async function fetchData() {
        els.meta.textContent = '监控信息加载中...';
        try {
          const res = await fetch(`${API_BASE}/api/source-monitor`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          const s = data.summary || {};
          const orchestratorSummary = (data.orchestrator || {}).summary || {};
          els.stat_source_ok.textContent = String(s.source_ok ?? '-');
          els.stat_source_bad.textContent = String((s.source_warn || 0) + (s.source_error || 0));
          els.stat_process_ok.textContent = `${s.process_ok ?? '-'} / ${((s.process_ok || 0) + (s.process_warn || 0) + (s.process_error || 0)) || '-'}`;
          els.stat_now.textContent = (s.now || '-').replace('T', ' ').replace('Z', ' UTC');
          els.stat_job_success.textContent = String(orchestratorSummary.success ?? '-');
          els.stat_job_bad.textContent = String((orchestratorSummary.failed || 0) + (orchestratorSummary.running || 0));
          renderSources(data.sources);
          renderProcesses(data.processes);
          renderJobs((data.orchestrator || {}).recent_runs || []);
          renderCounts(data.row_counts);
          renderLogs(data.logs);
          els.meta.textContent = `监控正常，已刷新 ${els.stat_now.textContent}`;
        } catch (err) {
          els.meta.textContent = `请求失败: ${err.message}`;
          els.sources.innerHTML = '';
          els.processes.innerHTML = '';
          els.jobs.innerHTML = '';
          els.row_counts.innerHTML = '';
          els.logs.innerHTML = '';
        }
      }

      function scheduleRefresh(delay = 800) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = () => {
          scheduleRefresh(500);
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.refresh_btn.addEventListener('click', fetchData);
      fetchData();
      setInterval(fetchData, 10000);
      connectRealtime();
    </script>
  </body>
</html>
