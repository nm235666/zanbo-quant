<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>群聊总览</title>
    <style>
      :root {
        --bg: #f7fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 34%),
          radial-gradient(circle at 100% 100%, #dbeafe 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1360px; margin: 24px auto 40px; padding: 0 16px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 18px;
      }
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      h1 { margin: 0; font-size: 28px; }
      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.75;
      }
      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .nav a {
        color: var(--primary);
        text-decoration: none;
        font-size: 14px;
      }
      .summary-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .summary-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }
      .summary-label { color: var(--muted); font-size: 12px; }
      .summary-value { margin-top: 6px; font-size: 26px; font-weight: 700; }
      .controls {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1.4fr 160px 120px 120px 140px 140px 120px 110px;
        gap: 10px;
      }
      input, select, button {
        height: 42px;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button {
        cursor: pointer;
        border: none;
        color: #fff;
        background: var(--primary);
      }
      button:hover { background: var(--primary-dark); }
      .meta {
        margin: 12px 0;
        color: var(--muted);
        font-size: 13px;
        min-height: 18px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .card {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      }
      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .title {
        font-size: 19px;
        font-weight: 700;
        line-height: 1.45;
      }
      .title-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.7;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid #d6dde7;
        background: #f8fafc;
        color: #334155;
      }
      .badge-category { background: #ecfeff; color: #155e75; border-color: #a5f3fc; }
      .badge-tagged { background: #ecfdf5; color: #166534; border-color: #bbf7d0; }
      .badge-skip { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
      .badge-live { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
      .badge-risk-high { background: #7f1d1d; color: #fff; border-color: #7f1d1d; }
      .badge-risk-mid { background: #a16207; color: #fff; border-color: #a16207; }
      .badge-risk-low { background: #065f46; color: #fff; border-color: #065f46; }
      .badge-activity-high { background: #14532d; color: #fff; border-color: #14532d; }
      .badge-activity-mid { background: #0f766e; color: #fff; border-color: #0f766e; }
      .badge-activity-low { background: #475569; color: #fff; border-color: #475569; }
      .badge-fetch-ok { background: #ecfdf5; color: #166534; border-color: #bbf7d0; }
      .badge-fetch-error { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
      .badge-fetch-unknown { background: #f8fafc; color: #475569; border-color: #cbd5e1; }
      .card-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
      .mini-btn {
        height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #0f172a;
        font-size: 13px;
        cursor: pointer;
      }
      .mini-btn:hover { border-color: #0f766e; color: #0f766e; }
      .mini-btn:disabled { opacity: 0.6; cursor: wait; }
      .summary {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid #dbe4ea;
        color: #1f2937;
        line-height: 1.8;
      }
      .grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .kv {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
      }
      .kv .k {
        color: var(--muted);
        font-size: 12px;
      }
      .kv .v {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.6;
        word-break: break-word;
      }
      .tags {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        border: 1px solid #c7d2fe;
        font-size: 12px;
      }
      .pager {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .pager button { width: 90px; }
      .empty {
        border: 1px dashed var(--border);
        border-radius: 14px;
        padding: 26px;
        text-align: center;
        color: var(--muted);
      }
      @media (max-width: 1100px) {
        .summary-grid { grid-template-columns: 1fr 1fr; }
        .controls { grid-template-columns: 1fr 1fr; }
        .grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 640px) {
        .summary-grid, .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div>
            <h1>群聊总览</h1>
            <div class="sub">集中查看所有群聊的成员规模、聊天数据回填状态、实时监控状态，以及大模型生成的分类标签与摘要。</div>
          </div>
          <div class="nav">
            <a href="/index.html">首页</a>
            <a href="/wechat_chatlog.html">聊天记录查询</a>
            <a href="/source_monitor.html">数据源监控</a>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-label">群聊总数</div>
            <div class="summary-value" id="sum_rooms">-</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">已有聊天记录</div>
            <div class="summary-value" id="sum_with_logs">-</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">已停监控</div>
            <div class="summary-value" id="sum_skip">-</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">已打标签</div>
            <div class="summary-value" id="sum_tagged">-</div>
          </div>
        </div>

        <div class="controls">
          <input id="keyword" placeholder="搜索群名/备注/摘要/标签" />
          <select id="primary_category">
            <option value="">全部分类</option>
          </select>
          <select id="activity_level">
            <option value="">全部活跃度</option>
          </select>
          <select id="risk_level">
            <option value="">全部风险等级</option>
          </select>
          <select id="skip_realtime_monitor">
            <option value="">全部监控状态</option>
            <option value="0">监控中</option>
            <option value="1">已停监控</option>
          </select>
          <select id="fetch_status">
            <option value="">全部拉取状态</option>
            <option value="failed">只看失败</option>
            <option value="ok">只看成功</option>
            <option value="unknown">未拉取</option>
          </select>
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="list" id="list"></div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        keyword: '',
        primary_category: '',
        activity_level: '',
        risk_level: '',
        skip_realtime_monitor: '',
        fetch_status: '',
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
      };

      const els = {
        keyword: document.getElementById('keyword'),
        primary_category: document.getElementById('primary_category'),
        activity_level: document.getElementById('activity_level'),
        risk_level: document.getElementById('risk_level'),
        skip_realtime_monitor: document.getElementById('skip_realtime_monitor'),
        fetch_status: document.getElementById('fetch_status'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
        sum_rooms: document.getElementById('sum_rooms'),
        sum_with_logs: document.getElementById('sum_with_logs'),
        sum_skip: document.getElementById('sum_skip'),
        sum_tagged: document.getElementById('sum_tagged'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function parseTags(raw) {
        if (!raw) return [];
        try {
          const obj = JSON.parse(raw);
          return Array.isArray(obj.all_tags) ? obj.all_tags : [];
        } catch (_) {
          return [];
        }
      }

      function fillSelect(selectEl, items, placeholder, currentValue) {
        selectEl.innerHTML = [`<option value="">${placeholder}</option>`]
          .concat((items || []).map((item) => {
            const selected = item === currentValue ? ' selected' : '';
            return `<option value="${escapeHtml(item)}"${selected}>${escapeHtml(item)}</option>`;
          }))
          .join('');
      }

      function riskBadge(level) {
        if (level === '高') return 'badge badge-risk-high';
        if (level === '中') return 'badge badge-risk-mid';
        return 'badge badge-risk-low';
      }

      function activityBadge(level) {
        if (level === '高') return 'badge badge-activity-high';
        if (level === '中') return 'badge badge-activity-mid';
        return 'badge badge-activity-low';
      }

      function fetchStatusBadge(status) {
        const value = String(status || '').trim();
        if (!value) return '<span class="badge badge-fetch-unknown">未拉取</span>';
        if (value === 'ok') return '<span class="badge badge-fetch-ok">最近拉取成功</span>';
        return `<span class="badge badge-fetch-error">${escapeHtml(value)}</span>`;
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="empty">暂无符合条件的群聊数据</div>';
          return;
        }
        els.list.innerHTML = items.map((it) => {
          const tags = parseTags(it.llm_chatroom_tags_json);
          const displayName = it.remark || it.nick_name || it.room_id || '(未命名群)';
          return `
            <article class="card">
              <div class="card-head">
                <div>
                  <div class="title">${escapeHtml(displayName)}</div>
                  <div class="title-sub">
                    room_id: ${escapeHtml(it.room_id || '')}
                    ${it.nick_name && it.remark && it.nick_name !== it.remark ? ` | 群昵称: ${escapeHtml(it.nick_name)}` : ''}
                  </div>
                </div>
                <div class="badges">
                  ${it.llm_chatroom_primary_category ? `<span class="badge badge-category">${escapeHtml(it.llm_chatroom_primary_category)}</span>` : ''}
                  <span class="${it.skip_realtime_monitor ? 'badge badge-skip' : 'badge badge-live'}">${it.skip_realtime_monitor ? '已停监控' : '监控中'}</span>
                  ${it.llm_chatroom_activity_level ? `<span class="${activityBadge(it.llm_chatroom_activity_level)}">活跃度 ${escapeHtml(it.llm_chatroom_activity_level)}</span>` : ''}
                  ${it.llm_chatroom_risk_level ? `<span class="${riskBadge(it.llm_chatroom_risk_level)}">风险 ${escapeHtml(it.llm_chatroom_risk_level)}</span>` : ''}
                  ${it.llm_chatroom_tagged_at ? '<span class="badge badge-tagged">已打标签</span>' : ''}
                  ${fetchStatusBadge(it.last_chatlog_backfill_status)}
                </div>
              </div>

              ${it.llm_chatroom_summary ? `<div class="summary">${escapeHtml(it.llm_chatroom_summary)}</div>` : ''}

              <div class="grid">
                <div class="kv">
                  <div class="k">成员数</div>
                  <div class="v">${it.user_count ?? '-'}</div>
                </div>
                <div class="kv">
                  <div class="k">消息总条数</div>
                  <div class="v">${it.message_row_count ?? 0}</div>
                </div>
                <div class="kv">
                  <div class="k">最近消息日期</div>
                  <div class="v">${escapeHtml(it.last_message_date || '-')}</div>
                </div>
                <div class="kv">
                  <div class="k">最近回填状态</div>
                  <div class="v">${escapeHtml(it.last_chatlog_backfill_status || '-')}</div>
                </div>
                <div class="kv">
                  <div class="k">最近拉取时间</div>
                  <div class="v">${escapeHtml(it.last_chatlog_backfill_at || '-')}</div>
                </div>
                <div class="kv">
                  <div class="k">30天原始消息块</div>
                  <div class="v">${it.last_30d_raw_message_count ?? 0}</div>
                </div>
                <div class="kv">
                  <div class="k">30天清洗后消息</div>
                  <div class="v">${it.last_30d_clean_message_count ?? 0}</div>
                </div>
                <div class="kv">
                  <div class="k">30天抓取失败次数</div>
                  <div class="v">${it.last_30d_fetch_fail_count ?? 0}</div>
                </div>
                <div class="kv">
                  <div class="k">LLM 置信度 / 模型</div>
                  <div class="v">${it.llm_chatroom_confidence ?? '-'}${it.llm_chatroom_model ? ` / ${escapeHtml(it.llm_chatroom_model)}` : ''}</div>
                </div>
              </div>

              <div class="card-actions">
                <button class="mini-btn js-fetch-now" data-room-id="${escapeHtml(it.room_id || '')}" data-room-name="${escapeHtml(displayName)}">立即拉取这个群</button>
              </div>

              ${tags.length ? `
                <div class="tags">
                  ${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                </div>
              ` : ''}
            </article>
          `;
        }).join('');
      }

      function updateSummary(summary) {
        els.sum_rooms.textContent = summary.room_total ?? '-';
        els.sum_with_logs.textContent = summary.room_with_logs ?? '-';
        els.sum_skip.textContent = summary.skip_total ?? '-';
        els.sum_tagged.textContent = summary.tagged_total ?? '-';
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          keyword: state.keyword,
          primary_category: state.primary_category,
          activity_level: state.activity_level,
          risk_level: state.risk_level,
          skip_realtime_monitor: state.skip_realtime_monitor,
          fetch_status: state.fetch_status,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/chatrooms?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total = data.total || 0;
          state.total_pages = data.total_pages || 1;
          updateSummary(data.summary || {});
          fillSelect(els.primary_category, data.filters?.primary_categories || [], '全部分类', state.primary_category);
          fillSelect(els.activity_level, data.filters?.activity_levels || [], '全部活跃度', state.activity_level);
          fillSelect(els.risk_level, data.filters?.risk_levels || [], '全部风险等级', state.risk_level);
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 个群聊，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          renderList([]);
          updatePager();
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      function search(resetPage = true) {
        state.keyword = els.keyword.value.trim();
        state.primary_category = els.primary_category.value.trim();
        state.activity_level = els.activity_level.value.trim();
        state.risk_level = els.risk_level.value.trim();
        state.skip_realtime_monitor = els.skip_realtime_monitor.value.trim();
        state.fetch_status = els.fetch_status.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      async function fetchRoomNow(roomId, buttonEl) {
        const q = new URLSearchParams({ room_id: roomId, mode: 'today' });
        const oldText = buttonEl.textContent;
        buttonEl.disabled = true;
        buttonEl.textContent = '拉取中...';
        els.meta.textContent = `正在立即拉取 ${buttonEl.dataset.roomName || roomId} ...`;
        try {
          const res = await fetch(`${API_BASE}/api/chatrooms/fetch?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '立即拉取失败');
          els.meta.textContent = `拉取完成: ${buttonEl.dataset.roomName || roomId}`;
          await fetchData();
        } catch (err) {
          els.meta.textContent = `立即拉取失败: ${err.message}`;
        } finally {
          buttonEl.disabled = false;
          buttonEl.textContent = oldText;
        }
      }

      function scheduleRefresh(delay = 700) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            const evt = msg.event || '';
            if (!['chatroom_list_update', 'chatroom_fetch_update', 'chatlog_monitor_update'].includes(evt)) return;
            scheduleRefresh(300);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.keyword].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      [els.primary_category, els.activity_level, els.risk_level, els.skip_realtime_monitor, els.fetch_status, els.page_size].forEach((el) => {
        el.addEventListener('change', () => search(true));
      });
      els.list.addEventListener('click', (e) => {
        const button = e.target.closest('.js-fetch-now');
        if (!button) return;
        fetchRoomNow(button.dataset.roomId || '', button);
      });
      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
