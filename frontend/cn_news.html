<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国内财经资讯</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 0%, #dff7f3 0%, transparent 40%),
          radial-gradient(circle at 95% 100%, #e5edff 0%, transparent 45%),
          var(--bg);
      }
      .wrap { max-width: 1160px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      .controls {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 140px 140px 110px 100px;
        gap: 10px;
      }
      .importance-filter {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        padding: 4px 10px;
        font-size: 12px;
        color: #334155;
      }
      .chip input { width: 14px; height: 14px; margin: 0; }
      input, select, button {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
        background: #fff;
      }
      button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
      button:hover { background: var(--primary-dark); }
      .meta { margin: 10px 0; color: var(--muted); font-size: 13px; min-height: 18px; }
      .realtime {
        margin: 8px 0 0;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 12px;
        color: #475569;
      }
      .realtime-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #94a3b8;
      }
      .realtime-dot.live { background: #16a34a; box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12); }
      .list { display: grid; gap: 10px; }
      .item {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 12px 84px;
        background: #fff;
      }
      .item-title { margin: 0 0 8px; font-size: 17px; line-height: 1.45; }
      .item-title a { color: #0f172a; text-decoration: none; }
      .item-title a:hover { color: var(--primary); }
      .item-meta { margin: 0 0 8px; font-size: 12px; color: #64748b; }
      .item-summary { margin: 0; line-height: 1.75; color: #334155; font-size: 14px; }
      .badge-area {
        position: absolute;
        right: 12px;
        bottom: 10px;
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .impact-area {
        position: absolute;
        left: 12px;
        bottom: 10px;
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        max-width: 58%;
      }
      .badge {
        border-radius: 999px;
        font-size: 12px;
        line-height: 1;
        padding: 7px 10px;
        border: 1px solid #d1d5db;
        background: #f8fafc;
        color: #334155;
      }
      .badge-importance-极高 { background: #7f1d1d; color: #fff; border-color: #7f1d1d; }
      .badge-importance-高 { background: #b91c1c; color: #fff; border-color: #b91c1c; }
      .badge-importance-中 { background: #a16207; color: #fff; border-color: #a16207; }
      .badge-importance-低 { background: #0369a1; color: #fff; border-color: #0369a1; }
      .badge-importance-极低 { background: #475569; color: #fff; border-color: #475569; }
      .badge-status-ok { background: #065f46; color: #fff; border-color: #065f46; }
      .badge-status-pending { background: #334155; color: #fff; border-color: #334155; }
      .badge-impact-group { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
      .badge-impact-up { background: #dcfce7; color: #14532d; border-color: #bbf7d0; }
      .badge-impact-down { background: #fee2e2; color: #7f1d1d; border-color: #fecaca; }
      .badge-impact-neutral { background: #f1f5f9; color: #334155; border-color: #e2e8f0; }
      .pager {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pager button { width: 90px; }
      @media (max-width: 980px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>国内财经资讯</h1>
          <div>
            <a class="link" href="/index.html">股票代码页</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/news.html">国际财经资讯</a>
            <span style="margin:0 6px;color:#94a3b8;">|</span>
            <a class="link" href="/llm_trend.html">LLM走势分析</a>
          </div>
        </div>

        <div class="controls">
          <input id="keyword" placeholder="关键词（匹配标题/摘要）" />
          <input id="date_from" placeholder="开始时间，如 2026-01-01" />
          <input id="date_to" placeholder="结束时间，如 2026-12-31" />
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>
        <div class="importance-filter" id="importance_filter">
          <span style="font-size:12px;color:#64748b;">财经重要程度（多选）:</span>
          <label class="chip"><input type="checkbox" value="极高" /> 极高</label>
          <label class="chip"><input type="checkbox" value="高" /> 高</label>
          <label class="chip"><input type="checkbox" value="中" /> 中</label>
          <label class="chip"><input type="checkbox" value="低" /> 低</label>
          <label class="chip"><input type="checkbox" value="极低" /> 极低</label>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="realtime">
          <span class="realtime-dot" id="rt_dot"></span>
          <span id="rt_meta">实时流: 未连接</span>
        </div>
        <div class="list" id="list"></div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = {
        keyword: '',
        date_from: '',
        date_to: '',
        finance_levels: [],
        page: 1,
        page_size: 20,
        total_pages: 1,
        total: 0,
      };
      const DOMESTIC_SOURCE_PREFIX = 'cn_';

      const SOURCE_LABELS = {
        cn_sina_7x24: '新浪7x24',
        cn_eastmoney_fastnews: '东方财富快讯',
      };

      const els = {
        keyword: document.getElementById('keyword'),
        date_from: document.getElementById('date_from'),
        date_to: document.getElementById('date_to'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        importance_filter: document.getElementById('importance_filter'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        rt_dot: document.getElementById('rt_dot'),
        rt_meta: document.getElementById('rt_meta'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="item"><p class="item-summary">暂无数据</p></div>';
          return;
        }
        els.list.innerHTML = items.map((it) => `
          <article class="item">
            <h3 class="item-title">
              <a href="${it.link || '#'}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title || '(无标题)')}</a>
            </h3>
            <p class="item-meta">
              来源: ${escapeHtml(SOURCE_LABELS[it.source] || it.source || '国内源')}
              ${it.pub_date ? ` | 发布时间: ${escapeHtml(it.pub_date)}` : ''}
              ${it.author ? ` | 作者: ${escapeHtml(it.author)}` : ''}
            </p>
            <p class="item-summary">${escapeHtml(it.summary || '')}</p>
            <div class="impact-area">${renderImpacts(it.llm_impacts_json)}</div>
            <div class="badge-area">
              <span class="badge badge-importance-${escapeHtml(it.llm_finance_importance || '极低')}">重要程度: ${escapeHtml(it.llm_finance_importance || '未评')}</span>
              <span class="badge ${it.llm_scored_at ? 'badge-status-ok' : 'badge-status-pending'}">${it.llm_scored_at ? '已评分' : '待评分'}</span>
              <span class="badge">系统: ${it.llm_system_score ?? '-'}</span>
              <span class="badge">财经影响: ${it.llm_finance_impact_score ?? '-'}</span>
            </div>
          </article>
        `).join('');
      }

      function renderImpacts(rawJson) {
        if (!rawJson) return '<span class="badge badge-impact-neutral">影响项: 暂无</span>';
        let obj = {};
        try {
          obj = JSON.parse(rawJson);
        } catch (_) {
          return '<span class="badge badge-impact-neutral">影响项: 暂无</span>';
        }
        const dims = [
          { key: 'macro', label: '宏观' },
          { key: 'markets', label: '市场' },
          { key: 'sectors', label: '行业' },
        ];
        const out = [];
        for (const d of dims) {
          const arr = Array.isArray(obj[d.key]) ? obj[d.key] : [];
          if (!arr.length) continue;
          const first = arr[0] || {};
          const item = escapeHtml(first.item || '');
          const dir = String(first.direction || '中性');
          const cls = dir === '利多' ? 'badge-impact-up' : (dir === '利空' ? 'badge-impact-down' : 'badge-impact-neutral');
          out.push(`<span class="badge badge-impact-group">${d.label}</span>`);
          out.push(`<span class="badge ${cls}">${item || d.label}: ${escapeHtml(dir)}</span>`);
        }
        return out.length ? out.join('') : '<span class="badge badge-impact-neutral">影响项: 暂无</span>';
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          source_prefixes: DOMESTIC_SOURCE_PREFIX,
          keyword: state.keyword,
          date_from: state.date_from,
          date_to: state.date_to,
          finance_levels: state.finance_levels.join(','),
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/news?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total_pages = data.total_pages || 1;
          state.total = data.total || 0;
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          els.meta.textContent = `请求失败: ${err.message}`;
          state.total_pages = 1;
          renderList([]);
          updatePager();
        }
      }

      function search(resetPage = true) {
        state.keyword = els.keyword.value.trim();
        state.date_from = els.date_from.value.trim();
        state.date_to = els.date_to.value.trim();
        state.finance_levels = Array.from(
          els.importance_filter.querySelectorAll('input[type="checkbox"]:checked')
        ).map((x) => x.value);
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function setRealtimeStatus(text, live = false) {
        els.rt_meta.textContent = text;
        els.rt_dot.classList.toggle('live', Boolean(live));
      }

      function handleRealtimeMessage(msg) {
        if (msg.channel !== 'news' || msg.event !== 'news_batch') return;
        const payload = msg.payload || {};
        if (payload.scope !== 'domestic') return;
        const items = Array.isArray(payload.items) ? payload.items : [];
        if (!items.length) return;
        const firstTitle = items[0]?.title || '新国内新闻';
        setRealtimeStatus(`实时流已连接，刚收到 ${items.length} 条：${firstTitle}`, true);
        if (state.page === 1) {
          fetchData();
        }
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        setRealtimeStatus('实时流连接中...', false);
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onopen = () => {
          setRealtimeStatus('实时流已连接，等待新国内新闻...', true);
        };
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            handleRealtimeMessage(msg);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          setRealtimeStatus('实时流已断开，3 秒后重连', false);
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = window.setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {
          setRealtimeStatus('实时流连接异常，等待重连', false);
        };
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.keyword, els.date_from, els.date_to].forEach((el) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') search(true);
        });
      });
      els.importance_filter.querySelectorAll('input[type="checkbox"]').forEach((el) => {
        el.addEventListener('change', () => search(true));
      });
      els.page_size.addEventListener('change', () => search(true));
      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
