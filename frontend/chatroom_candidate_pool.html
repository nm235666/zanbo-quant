<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票候选池</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 34%),
          radial-gradient(circle at 100% 100%, #dbeafe 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1360px; margin: 24px auto 40px; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); padding: 18px; }
      .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
      h1 { margin:0; font-size:28px; }
      .sub { margin-top:6px; color:var(--muted); font-size:14px; line-height:1.75; }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      .nav a { color:var(--primary); text-decoration:none; font-size:14px; }
      .summary-grid { margin-top:16px; display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; }
      .summary-card { border:1px solid var(--border); border-radius:14px; padding:14px; background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%); }
      .summary-label { color:var(--muted); font-size:12px; }
      .summary-value { margin-top:6px; font-size:26px; font-weight:700; }
      .controls { margin-top:18px; display:grid; grid-template-columns:1.3fr 140px 140px 120px 110px; gap:10px; }
      input, select, button { height:42px; border-radius:12px; border:1px solid var(--border); padding:0 12px; font-size:14px; background:#fff; }
      button { cursor:pointer; border:none; color:#fff; background:var(--primary); }
      button:hover { background:var(--primary-dark); }
      .meta { margin:12px 0; color:var(--muted); font-size:13px; min-height:18px; }
      .list-shell { border:1px solid var(--border); border-radius:16px; overflow:hidden; background:#fff; }
      .list-head, .list-row {
        display:grid;
        grid-template-columns: 1.8fr 90px 96px 96px 80px 100px 90px 120px;
        gap:12px;
        align-items:start;
        padding:14px 16px;
      }
      .list-head {
        background:#f1f5f9;
        color:#475569;
        font-size:12px;
        font-weight:700;
        letter-spacing:.02em;
      }
      .list-row {
        border-top:1px solid var(--border);
      }
      .list-row:nth-child(even) {
        background:#fcfdff;
      }
      .cell-name {
        display:flex;
        flex-direction:column;
        gap:8px;
      }
      .title { font-size:17px; font-weight:700; line-height:1.45; }
      .badges { display:flex; gap:6px; flex-wrap:wrap; }
      .badge { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; border:1px solid #d6dde7; background:#f8fafc; color:#334155; }
      .badge-bull { background:#14532d; color:#fff; border-color:#14532d; }
      .badge-bear { background:#7f1d1d; color:#fff; border-color:#7f1d1d; }
      .badge-type { background:#ecfeff; color:#155e75; border-color:#a5f3fc; }
      .cell { font-size:14px; line-height:1.7; color:#0f172a; word-break:break-word; }
      .cell-num { font-weight:700; }
      .cell-muted { color:var(--muted); }
      .reason-list { display:grid; gap:8px; }
      .reason-item {
        border:1px solid #e2e8f0;
        border-radius:12px;
        padding:10px 12px;
        background:#f8fafc;
      }
      .reason-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
      .reason-title { font-size:13px; font-weight:700; color:#334155; }
      .reason-body { margin-top:6px; color:#334155; line-height:1.7; font-size:13px; }
      .pager { margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
      .pager button { width:90px; }
      .empty { border:1px dashed var(--border); border-radius:14px; padding:26px; text-align:center; color:var(--muted); }
      @media (max-width: 1100px) {
        .summary-grid { grid-template-columns:1fr 1fr; }
        .controls { grid-template-columns:1fr 1fr; }
        .list-head { display:none; }
        .list-row {
          grid-template-columns:1fr;
          gap:10px;
        }
      }
      @media (max-width: 640px) {
        .summary-grid { grid-template-columns:1fr; }
        .controls { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div>
            <h1>股票候选池</h1>
            <div class="sub">将群聊里的看多看空标的与主题做聚合，形成一个便于追踪的候选池。你可以从这里看到哪些方向被更多群聊持续看多或看空。</div>
          </div>
          <div class="nav">
            <a href="/index.html">首页</a>
            <a href="/chatroom_investment.html">群聊投资倾向</a>
            <a href="/chatrooms.html">群聊总览</a>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-card"><div class="summary-label">候选总数</div><div class="summary-value" id="sum_total">-</div></div>
          <div class="summary-card"><div class="summary-label">主导看多</div><div class="summary-value" id="sum_bull">-</div></div>
          <div class="summary-card"><div class="summary-label">主导看空</div><div class="summary-value" id="sum_bear">-</div></div>
          <div class="summary-card"><div class="summary-label">股票/标的类</div><div class="summary-value" id="sum_stock">-</div></div>
        </div>

        <div class="controls">
          <input id="keyword" placeholder="搜索股票/主题/理由" />
          <select id="dominant_bias"><option value="">全部方向</option></select>
          <select id="candidate_type"><option value="">全部类型</option></select>
          <select id="page_size">
            <option value="20">20/页</option>
            <option value="50">50/页</option>
            <option value="100">100/页</option>
          </select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="list-shell">
          <div class="list-head">
            <div>标的</div>
            <div>主导方向</div>
            <div>看多群数</div>
            <div>看空群数</div>
          <div>净分</div>
          <div>涉及群数</div>
          <div>提及次数</div>
          <div>最近分析日</div>
        </div>
          <div class="list" id="list"></div>
        </div>

        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = { keyword: '', dominant_bias: '', candidate_type: '', page: 1, page_size: 20, total_pages: 1, total: 0 };
      const els = {
        keyword: document.getElementById('keyword'),
        dominant_bias: document.getElementById('dominant_bias'),
        candidate_type: document.getElementById('candidate_type'),
        page_size: document.getElementById('page_size'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        list: document.getElementById('list'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
        sum_total: document.getElementById('sum_total'),
        sum_bull: document.getElementById('sum_bull'),
        sum_bear: document.getElementById('sum_bear'),
        sum_stock: document.getElementById('sum_stock'),
      };
      let realtimeSocket = null;
      let realtimeRetryTimer = 0;
      let refreshTimer = 0;

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function fillSelect(selectEl, items, placeholder, currentValue) {
        selectEl.innerHTML = [`<option value="">${placeholder}</option>`]
          .concat((items || []).map((item) => {
            const selected = item === currentValue ? ' selected' : '';
            return `<option value="${escapeHtml(item)}"${selected}>${escapeHtml(item)}</option>`;
          }))
          .join('');
      }

      function parseJsonList(raw) {
        if (!raw) return [];
        try {
          const obj = JSON.parse(raw);
          return Array.isArray(obj) ? obj : [];
        } catch (_) {
          return [];
        }
      }

      function updateSummary(summary) {
        els.sum_total.textContent = summary.candidate_total ?? '-';
        els.sum_bull.textContent = summary.bullish_total ?? '-';
        els.sum_bear.textContent = summary.bearish_total ?? '-';
        els.sum_stock.textContent = summary.stock_like_total ?? '-';
      }

      function renderList(items) {
        if (!items.length) {
          els.list.innerHTML = '<div class="empty">暂无候选池数据，请先运行候选池汇总脚本。</div>';
          return;
        }
        els.list.innerHTML = items.map((it) => {
          const dominantClass = it.dominant_bias === '看多' ? 'badge badge-bull' : 'badge badge-bear';
          return `
            <article class="list-row">
              <div class="cell cell-name">
                <div class="title">${escapeHtml(it.candidate_name || '')}</div>
                <div class="badges">
                  <span class="badge badge-type">${escapeHtml(it.candidate_type || '未知')}</span>
                </div>
              </div>
              <div class="cell">
                <span class="${dominantClass}">${escapeHtml(it.dominant_bias || '-')}</span>
              </div>
              <div class="cell cell-num">${it.bullish_room_count ?? 0}</div>
              <div class="cell cell-num">${it.bearish_room_count ?? 0}</div>
              <div class="cell cell-num">${it.net_score ?? 0}</div>
              <div class="cell cell-num">${it.room_count ?? 0}</div>
              <div class="cell cell-num">${it.mention_count ?? 0}</div>
              <div class="cell cell-muted">${escapeHtml(it.latest_analysis_date || '-')}</div>
            </article>
          `;
        }).join('');
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      async function fetchData() {
        const q = new URLSearchParams({
          keyword: state.keyword,
          dominant_bias: state.dominant_bias,
          candidate_type: state.candidate_type,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '查询中...';
        try {
          const res = await fetch(`${API_BASE}/api/chatrooms/candidate-pool?${q.toString()}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '请求失败');
          state.total = data.total || 0;
          state.total_pages = data.total_pages || 1;
          updateSummary(data.summary || {});
          fillSelect(els.dominant_bias, data.filters?.dominant_biases || [], '全部方向', state.dominant_bias);
          fillSelect(els.candidate_type, data.filters?.candidate_types || [], '全部类型', state.candidate_type);
          renderList(data.items || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条候选池结果，当前每页 ${state.page_size} 条，API: ${API_BASE}`;
        } catch (err) {
          renderList([]);
          updatePager();
          els.meta.textContent = `请求失败: ${err.message}`;
        }
      }

      function search(resetPage = true) {
        state.keyword = els.keyword.value.trim();
        state.dominant_bias = els.dominant_bias.value.trim();
        state.candidate_type = els.candidate_type.value.trim();
        state.page_size = Number(els.page_size.value || '20');
        if (resetPage) state.page = 1;
        fetchData();
      }

      function scheduleRefresh(delay = 700) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchData, delay);
      }

      const REALTIME_WS_CANDIDATES = (() => {
        const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const host = window.location.hostname || '127.0.0.1';
        const candidates = [];
        if (window.location.port === '8077') {
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        } else {
          candidates.push(`${scheme}://${host}:8077/ws/realtime`);
          candidates.push(`${scheme}://${window.location.host}/ws/realtime`);
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          candidates.push(`${scheme}://127.0.0.1:8077/ws/realtime`);
        }
        return [...new Set(candidates)];
      })();
      let realtimeCandidateIdx = 0;

      function realtimeUrl() {
        if (!REALTIME_WS_CANDIDATES.length) return '';
        return REALTIME_WS_CANDIDATES[realtimeCandidateIdx % REALTIME_WS_CANDIDATES.length];
      }

      function connectRealtime() {
        if (realtimeSocket) {
          try { realtimeSocket.close(); } catch (_) {}
        }
        const ws = new WebSocket(realtimeUrl());
        realtimeSocket = ws;
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.channel !== 'app') return;
            if (msg.event !== 'chatroom_candidate_pool_update') return;
            scheduleRefresh(350);
          } catch (_) {}
        };
        ws.onclose = () => {
          realtimeCandidateIdx += 1;
          clearTimeout(realtimeRetryTimer);
          realtimeRetryTimer = setTimeout(connectRealtime, 3000);
        };
        ws.onerror = () => {};
      }

      els.search_btn.addEventListener('click', () => search(true));
      [els.keyword].forEach((el) => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(true); }));
      [els.dominant_bias, els.candidate_type, els.page_size].forEach((el) => el.addEventListener('change', () => search(true)));
      els.prev_btn.addEventListener('click', () => { if (state.page > 1) { state.page -= 1; fetchData(); } });
      els.next_btn.addEventListener('click', () => { if (state.page < state.total_pages) { state.page += 1; fetchData(); } });
      fetchData();
      connectRealtime();
    </script>
  </body>
</html>
