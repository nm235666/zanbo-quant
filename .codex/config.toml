[project]
name = "zanbo-quant"
root = "/home/zanbo/zanbotest"
primary_goal = "frontend_presentation"
secondary_goal = "testability"

[guidance]
summary = """
Prioritize frontend presentation work first and testability second.
Prefer minimal, low-risk changes.
Do not do cross-module refactors unless explicitly requested.
Keep docs aligned with code and check doc freshness before git push.
"""

[paths]
frontend = "apps/web"
frontend_router = "apps/web/src/app/router.ts"
frontend_api = "apps/web/src/services/api"
frontend_stores = "apps/web/src/stores"
backend_entry = "backend/server.py"
backend_routes = "backend/routes"
jobs = "job_registry.py"
job_runners = "jobs"
quantaalpha_service = "services/quantaalpha_service"
quantaalpha_external = "external/quantaalpha"
agents_doc = "AGENTS.md"
system_overview = "docs/system_overview_cn.md"
runtime_doc = "README_WEB.md"

[validation]
frontend_build = "cd /home/zanbo/zanbotest/apps/web && npm run build"
python_compile = "cd /home/zanbo/zanbotest && python3 -m py_compile backend/server.py backend/routes/*.py job_registry.py"
quantaalpha_dry_run = "cd /home/zanbo/zanbotest && python3 job_orchestrator.py dry-run quantaalpha_health_check"
quant_factors_api_probe = "curl -i 'http://127.0.0.1:8077/api/quant-factors/results?page=1&page_size=1'"

[rules]
frontend_state_via_stores = true
keep_api_compatible = true
no_schema_changes_without_request = true
minimal_changes_only = true
no_new_deps_without_reason = true
check_docs_before_push = true
avoid_plaintext_secrets_in_repo = true
prefer_provider_healthcheck_before_backlog_jobs = true
prefer_single_item_smoke_before_parallel = true

[ops]
incident_mode_preferred_for_runtime_failures = true
task_schedule_must_match_cron = true
llm_provider_nodes_need_health_status = true
